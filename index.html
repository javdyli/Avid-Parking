// ═══ SQUARE PAYMENT ENGINE ═══════════════════════════════════
// Three-modal approach — all work without deploying to HTTPS:
//   1. CORS Proxy  → generates Square hosted checkout link (any context)
//   2. Terminal API → sends checkout to a paired Square Terminal device
//   3. POS App     → redirects to Square POS app on iPad/iPhone
// Note: corsproxy.io forwards your access token to Square — fine for
// production only after switching to your own backend proxy at apidomain/square

const SQ_PROXY = 'https://corsproxy.io/?url=';

function sqBase(){
  return S.squareCfg.sandbox
    ? 'https://connect.squareupsandbox.com'
    : 'https://connect.squareup.com';
}

async function sqFetch(path, method, body){
  if(IS_DEPLOYED){
    // ── Deployed on HTTPS: use our own secure Netlify backend proxy ──
    // Access token lives server-side in Netlify env vars — never exposed to browser
    const resp = await fetch('/api/square-proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: _pathToAction(path),
        // Also send credentials so the proxy works even before env vars are set
        accessToken:  S.squareCfg.accessToken,
        sandbox:      S.squareCfg.sandbox,
        locationId:   S.squareCfg.locationId,
        // Pass the original body fields flattened for the proxy to route
        ...(body||{}),
      }),
    });
    if(!resp.ok){
      const err = await resp.json().catch(()=>({error:resp.statusText}));
      throw new Error(err.error || err.errors?.[0]?.detail || `HTTP ${resp.status}`);
    }
    return resp.json();
  } else {
    // ── Local / non-HTTPS: use CORS proxy fallback ──
    const url = SQ_PROXY + encodeURIComponent(sqBase() + path);
    const resp = await fetch(url, {
      method,
      headers:{
        'Authorization': `Bearer ${S.squareCfg.accessToken}`,
        'Content-Type': 'application/json',
        'Square-Version': '2024-01-18',
        'x-requested-with': 'XMLHttpRequest',
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    if(!resp.ok){
      const err = await resp.json().catch(()=>({errors:[{detail:resp.statusText}]}));
      throw new Error(err.errors?.[0]?.detail || `HTTP ${resp.status}`);
    }
    return resp.json();
  }
}

// Map Square API paths to proxy action names
function _pathToAction(path){
  if(path.includes('/online-checkout/payment-links')) return 'payment_link';
  if(path.includes('/payments') && !path.includes('/terminal')) return 'create_payment';
  if(path.includes('/terminals/checkouts') && path.split('/').length <= 4) return 'terminal_checkout';
  if(path.includes('/terminals/checkouts/')) return 'get_terminal';
  if(path.includes('/locations')) return 'list_locations';
  if(path.includes('/invoices') && path.includes('/publish')) return 'publish_invoice';
  if(path.includes('/invoices')) return 'create_invoice';
  return 'unknown';
}

// ── 1. Payment Link (CORS proxy) ────────────────────────────
async function sqCreatePaymentLink(amountCents, description){
  const data = await sqFetch('/v2/online-checkout/payment-links','POST',{
    idempotency_key: uid(),
    quick_pay:{
      name: description,
      price_money:{ amount: amountCents, currency:'USD' },
      location_id: S.squareCfg.locationId,
    },
    checkout_options:{ ask_for_shipping_address: false },
  });
  return data.payment_link?.url;
}

// ── 2. Square Terminal checkout ────────────────────────────
async function sqTerminalCheckout(amountCents, description, deviceId){
  const data = await sqFetch('/v2/terminals/checkouts','POST',{
    idempotency_key: uid(),
    checkout:{
      amount_money:{ amount: amountCents, currency:'USD' },
      note: description,
      device_options:{ device_id: deviceId, skip_receipt_screen: false },
    },
  });
  return data.checkout?.id;
}

async function sqPollTerminal(checkoutId){
  const data = await sqFetch(`/v2/terminals/checkouts/${checkoutId}`,'GET',null);
  return data.checkout;
}

// ── 3. Square POS App (no HTTPS, no server needed) ─────────
function sqPosAppUrl(amountCents, description, callbackUrl){
  const data = JSON.stringify({
    amount_money:{ amount: amountCents, currency_code:'USD' },
    callback_url: callbackUrl || window.location.href,
    client_id: S.squareCfg.appId,
    version:'1.3',
    notes: description,
    options:{ supported_tender_types:['CREDIT_CARD','APPLE_PAY','GOOGLE_PAY','CASH'] },
  });
  return `square-commerce-v1://payment/create?data=${encodeURIComponent(btoa(data))}`;
}

// ── Ticket pay orchestrator ────────────────────────────────
async function sqTicketPay(sesId){
  const s=S.sessions.find(x=>x.id===sesId); if(!s)return;
  const total=Math.round(calcCharge(s)*1.0875*100);
  const desc=`Parking ${s.plate} · ${S.locs.find(l=>l.id===s.locId)?.name||'APS'}`;
  const btn=$('sq-ticket-pay-btn'), res=$('sq-ticket-result');
  if(btn){btn.disabled=true;btn.textContent='Processing…';}

  // ── Path 0: Embedded card via Square Web Payments SDK (HTTPS only) ──
  if(IS_HTTPS && window._sqTicketCard){
    try{
      const result = await window._sqTicketCard.tokenize();
      if(result.status==='OK'){
        // Send token to our backend proxy → Square Payments API
        const data = await sqFetch('/v2/payments','POST',{
          source_id:       result.token,
          idempotency_key: uid(),
          amount_cents:    total,
          note:            desc,
          reference_id:    s.id,
        });
        if(data.payment?.status==='COMPLETED'){
          const ref='SQ-'+data.payment.id.slice(-8);
          processPayment(sesId,total/100,'square_card',data.payment.id,ref);
          if(res)res.innerHTML=`<div style="color:var(--green);font-weight:600;font-size:12px">✓ ${c$(total/100)} charged · ${ref}</div>`;
          setTimeout(()=>renderTicket(sesId),600);
          return;
        } else {
          throw new Error(data.payment?.status||JSON.stringify(data.errors));
        }
      } else {
        const msg=result.errors?.map(e=>e.message).join(', ')||'Card declined';
        if(res)res.innerHTML=`<div style="color:var(--red);font-size:12px">✕ ${msg}</div>`;
        if(btn){btn.disabled=false;btn.textContent='💳 Retry Charge';}
        return;
      }
    }catch(e){
      if(res)res.innerHTML=`<div style="color:var(--red);font-size:12px">✕ ${e.message}</div>`;
      if(btn){btn.disabled=false;btn.textContent='💳 Retry Charge';}
      return;
    }
  }

  // Check if a Terminal device is configured
  const termDeviceId = S.squareCfg.terminalDeviceId;
  
  try{
    if(termDeviceId){
      // Path A: Square Terminal API
      if(res)res.innerHTML=`<div class="alert-box i">📡 Sending to Square Terminal…</div>`;
      const checkoutId = await sqTerminalCheckout(total, desc, termDeviceId);
      if(res)res.innerHTML=`
        <div class="alert-box s">✓ <div><div style="font-weight:700">Sent to Square Terminal!</div>
        <div style="font-size:11px;margin-top:4px">Customer is completing payment on the Terminal. Checkout ID: <span style="font-family:var(--mono)">${checkoutId}</span></div></div></div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn bs bsm" onclick="sqConfirmTerminalPay('${sesId}','${checkoutId}')">✓ Confirm Paid</button>
          <button class="btn bo bsm" onclick="sqPollTerminalStatus('${sesId}','${checkoutId}')">↺ Check Status</button>
        </div>`;
      if(btn)btn.remove();
    } else {
      // Path B: Payment Link via CORS proxy
      const url = await sqCreatePaymentLink(total, desc);
      if(url){
        if(res)res.innerHTML=`
          <div style="background:var(--glt);border:1.5px solid var(--gbrd);border-radius:10px;padding:14px;margin-top:8px">
            <div style="font-weight:700;color:var(--green);margin-bottom:10px">✓ Square Checkout Link Ready — ${c$(total/100)}</div>
            <a href="${url}" target="_blank" class="btn bs" style="width:100%;justify-content:center;text-decoration:none;display:flex;margin-bottom:10px">🔗 Open Square Checkout →</a>
            <div style="font-size:11px;color:var(--mu);word-break:break-all;margin-bottom:10px">Or share: <span style="font-family:var(--mono);font-size:10px">${url}</span></div>
            <button class="btn bp bsm" onclick="processPayment('${sesId}',${total/100},'square_link',null,'SQ-'+uid().slice(0,8).toUpperCase());renderTicket('${sesId}')">✓ Mark Paid (after customer completes)</button>
          </div>`;
        if(btn)btn.remove();
      }
    }
  }catch(err){
    // Path C: POS App (no backend needed — works on any device)
    const posUrl = sqPosAppUrl(total, desc, window.location.href);
    if(res)res.innerHTML=`
      <div class="alert-box w" style="margin-bottom:10px">⚠ <div>${err.message.includes('CORS')||err.message.includes('fetch')?'CORS blocked (deploy to HTTPS for auto-link generation).':err.message}</div></div>
      <div style="font-weight:700;font-size:13px;margin-bottom:8px">Alternative payment options:</div>
      <a href="${posUrl}" class="btn bt" style="width:100%;justify-content:center;text-decoration:none;display:flex;margin-bottom:8px">📱 Open Square POS App (iPad/iPhone)</a>
      <div style="font-size:11px;color:var(--mu);margin-bottom:10px">Requires Square app + card reader on this device</div>
      <div style="background:var(--navy);border-radius:8px;padding:10px 12px;font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.55);word-break:break-all">
        API call your backend can make:<br>POST ${sqBase()}/v2/online-checkout/payment-links<br>Bearer ${S.squareCfg.accessToken?.slice(0,14)||'YOUR_TOKEN'}…
      </div>`;
    if(btn){btn.disabled=false;btn.textContent='🔁 Retry';}
  }
}

    <div style="background:var(--bg);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px">
      <div style="width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">${acct.fn[0].toUpperCase()}</div>
      <div><div style="font-size:14px;font-weight:700">${acct.fn} ${acct.ln}</div><div style="font-size:12px;color:var(--mu)">${acct.email}</div></div>
    </div>
    ${S.squareCfg.connected?`<div class="alert-box s" style="margin-bottom:12px">✓ <div><b>Square connected</b> — customer receives a payment link by email via Square Invoices API.</div></div>`:
    `<div class="alert-box w" style="margin-bottom:12px">⚠ <div>Square not connected — invoice marked sent, no payment link. <a href="#" onclick="go('square');closeModal()" style="color:var(--amber);font-weight:700">Connect Square →</a></div></div>`}
    <div class="fg2">
      <div><label class="flbl">Amount ($) *</label><input id="inv-amt" class="fi" type="number" step="0.01" value="${amount.toFixed(2)}"></div>
      <div><label class="flbl">Due Date</label><input id="inv-due" class="fi" type="date" value="${dueDate}"></div>
    </div>
    <label class="flbl">Customer Email</label><input id="inv-email" class="fi" type="email" value="${acct.email}">
    <label class="flbl">Description / Period</label><input id="inv-desc" class="fi" value="${inv?.period||'Monthly Parking — '+new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'})}">
    ${S.squareCfg.connected?`<div style="background:var(--navy);border-radius:9px;padding:11px 13px;margin-top:4px"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.35);margin-bottom:5px">Square Invoices API call (your APS backend)</div><div style="font-family:var(--mono);font-size:9.5px;color:rgba(255,255,255,.55);line-height:1.8">POST /v2/invoices<br>Authorization: Bearer ${S.squareCfg.accessToken?S.squareCfg.accessToken.slice(0,12)+'…':'YOUR_TOKEN'}<br>{ "invoice": { "location_id": "${S.squareCfg.locationId||'—'}", "delivery_method": "EMAIL", "payment_requests": [{ "request_type": "BALANCE", "due_date": "${dueDate}" }] } }</div></div>`:''}`,
    `<button class="btn bo" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="doSendInvoice('${acctId}','${invId||''}')">📧 ${S.squareCfg.connected?'Send via Square':'Mark as Sent'}</button>`,true);
}

function doSendInvoice(acctId,invId){
  const amt=parseFloat(document.getElementById('inv-amt')?.value||0);
  const due=document.getElementById('inv-due')?.value||'';
  const email=document.getElementById('inv-email')?.value||'';
  const desc=document.getElementById('inv-desc')?.value||'';
  if(invId){
    S.monthly=S.monthly.map(m=>m.id!==acctId?m:{...m,invoices:m.invoices.map(i=>i.id!==invId?i:{...i,status:'sent',due,amt:Math.round(amt*100)})});
  } else {
    S.monthly=S.monthly.map(m=>m.id!==acctId?m:{...m,invoices:[...m.invoices,{id:'i'+uid(),period:desc,amt:Math.round(amt*100),status:'sent',due,paid:null}]});
  }
  save();closeModal();renderContent();
  toast(S.squareCfg.connected?`Invoice sent via Square to ${email}`:'Invoice marked sent','ok');
}

const PAGES={dashboard:pgDashboard,daily:pgDaily,liveview:pgLiveView,lpr:pgLPR,sessions:pgSessions,reservations:pgReservations,monthly:pgMonthly,enforcement:pgEnforcement,validations:pgValidations,reports:pgReports,locations:pgLocations,users:pgUsers,square:pgSquare,attendant:pgAttendant,onboarding:pgOnboarding,platform:pgPlatform};

// ═══ CLIENT PORTAL ════════════════════════════════════════════
const P={step:'find',selLocId:null,rateType:'hourly',plate:'',name:'',email:'',phone:'',payMethod:'card',confirmCode:null,duration:2};

function openPortal(){P.step='find';P.selLocId=null;P.confirmCode=null;$('portal-wrap').classList.add('open');renderPortal();}
function closePortal(){$('portal-wrap').classList.remove('open');}
function renderPortal(){const el=$('portal-body');if(el)el.innerHTML=PORTAL[P.step]?PORTAL[P.step]():'';}

const PORTAL={
  find(){
    const locs=S.locs;
    return`
      <div class="portal-hero"><div class="portal-h1">Find Parking</div><div class="portal-h2">Real-time availability · ${CLIENTS[S.cidx].name}</div></div>
      <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px">Available Locations</div>
      <div class="ploc-grid">
        ${locs.map(l=>{
          const p=Math.round(l.occ/l.cap*100),avail=l.cap-l.occ;
          const sc=p>=90?'var(--red)':p>=75?'var(--amber)':'var(--green)';
          const sl=p>=90?'Full':p>=75?'Filling Up':'Available';
          return`<div class="ploc" onclick="P.selLocId='${l.id}';P.step='rates';renderPortal()">
            <div class="ploc-name">${l.name}</div>
            <div class="ploc-addr">${l.addr}</div>
            <div style="display:flex;align-items:flex-end;gap:8px;margin-bottom:8px">
              <div><div style="font-family:var(--mono);font-size:22px;font-weight:600;color:var(--blue)">$${l.rates.hourly}</div><div style="font-size:10px;color:var(--mu)">per hour</div></div>
              <div style="margin-left:auto;text-align:right"><div style="font-family:var(--mono);font-size:18px;font-weight:600;color:${sc}">${avail}</div><div style="font-size:10px;color:var(--mu)">spaces open</div></div>
            </div>
            <div class="ob"><div class="of" style="width:${p}%;background:${sc}"></div></div>
            <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
              <span style="font-size:10px;background:${p>=90?'var(--rlt)':p>=75?'var(--alt)':'var(--glt)'};color:${sc};padding:2px 8px;border-radius:10px;font-weight:700">${sl}</span>
              ${l.features?.includes('ev_charging')?'<span style="font-size:10px;background:var(--blt);color:var(--blue);padding:2px 8px;border-radius:10px;font-weight:700">⚡ EV</span>':''}
              ${l.features?.includes('covered')?'<span style="font-size:10px;background:var(--plt);color:var(--purple);padding:2px 8px;border-radius:10px;font-weight:700">Covered</span>':''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
  },
  rates(){
    const loc=S.locs.find(l=>l.id===P.selLocId);if(!loc)return'<div class="empty">Location not found</div>';
    const p=Math.round(loc.occ/loc.cap*100);
    return`
      <div class="back-link" onclick="P.step='find';renderPortal()">← Back to Locations</div>
      <div class="portal-hero" style="margin-top:10px"><div class="portal-h1">${loc.name}</div><div class="portal-h2">${loc.addr} · ${loc.hours}</div></div>
      <div class="pstep">
        <div class="psh"><div class="ps-num">1</div><div class="ps-title">Select Parking Type</div></div>
        <div class="psb">
          <div class="rt-grid">
            ${[{id:'hourly',ico:'🕐',lbl:'Hourly',price:`$${loc.rates.hourly}/hr`,desc:`Flexible · max $${loc.rates.daily}/day`},{id:'daily',ico:'☀️',lbl:'Daily Flat',price:`$${loc.rates.daily}`,desc:'Park all day at one flat rate'},{id:'event',ico:'🎪',lbl:'Event',price:`$${loc.rates.event}`,desc:'Special event flat rate'},{id:'overnight',ico:'🌙',lbl:'Overnight',price:`$${loc.rates.overnight}`,desc:'Overnight flat rate'}].map(rt=>`<div class="rt-card${P.rateType===rt.id?' sel':''}" onclick="P.rateType='${rt.id}';renderPortal()"><div class="rt-icon">${rt.ico}</div><div class="rt-label">${rt.lbl}</div><div class="rt-price">${rt.price}</div><div class="rt-desc">${rt.desc}</div></div>`).join('')}
          </div>
          ${P.rateType==='hourly'?`
            <label class="flbl">Estimated Duration</label>
            <select class="fi" oninput="P.duration=parseInt(this.value);renderPortal()">
              ${[1,2,3,4,6,8,10,12].map(h=>`<option value="${h}" ${P.duration===h?'selected':''}>${h} hour${h!==1?'s':''}</option>`).join('')}
            </select>
            <div class="rate-calc"><div class="rc-row"><span>Rate</span><span>$${loc.rates.hourly}/hr</span></div><div class="rc-row"><span>Duration</span><span>${P.duration}h estimated</span></div><div class="rc-row"><span>Daily cap</span><span>$${loc.rates.daily}</span></div><div class="rc-row"><span>Estimated total</span><span>$${Math.min(P.duration*loc.rates.hourly,loc.rates.daily).toFixed(2)}</span></div></div>`
          :`<div class="rate-calc"><div class="rc-row"><span>Flat rate</span><span style="font-size:18px;font-weight:700;color:var(--teal)">$${loc.rates[P.rateType]}</span></div><div class="rc-row"><span>No time limits</span><span></span></div></div>`}
          <div style="margin-top:14px">
            <div style="font-size:12px;font-weight:700;margin-bottom:8px;color:var(--navy)">All Rates at ${loc.name}</div>
            <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
              ${['hourly','daily','event','overnight','monthly'].map(rt=>`<div class="rate-item"><div class="rate-amt">$${loc.rates[rt]}</div><div class="rate-lbl">${rt}</div></div>`).join('')}
            </div>
          </div>
          <button class="btn bt" style="width:100%;justify-content:center;margin-top:16px" onclick="P.step='book';renderPortal()">Continue to Book →</button>
        </div>
      </div>`;
  },
  book(){
    const loc=S.locs.find(l=>l.id===P.selLocId);if(!loc)return'';
    const rateMap={hourly:Math.min(P.duration*loc.rates.hourly,loc.rates.daily),daily:loc.rates.daily,event:loc.rates.event,overnight:loc.rates.overnight};
    const amount=rateMap[P.rateType]||loc.rates.hourly;
    return`
      <div class="back-link" onclick="P.step='rates';renderPortal()">← Back to Rates</div>
      <div style="margin-top:10px" class="pstep">
        <div class="psh"><div class="ps-num">2</div><div class="ps-title">Your Details</div></div>
        <div class="psb">
          <div class="fg2">
            <div><label class="flbl">Full Name *</label><input id="p-name" class="fi" value="${P.name}" oninput="P.name=this.value" placeholder="John Smith"></div>
            <div><label class="flbl">License Plate *</label><input id="p-plate" class="fi mono" value="${P.plate}" oninput="P.plate=this.value.toUpperCase()" placeholder="ABC-1234" autocapitalize="characters"></div>
          </div>
          <div class="fg2">
            <div><label class="flbl">Email</label><input id="p-email" class="fi" type="email" value="${P.email}" oninput="P.email=this.value"></div>
            <div><label class="flbl">Phone</label><input id="p-phone" class="fi" value="${P.phone}" oninput="P.phone=this.value"></div>
          </div>
          <div class="rate-calc"><div class="rc-row"><span>Location</span><span>${loc.name}</span></div><div class="rc-row"><span>Parking type</span><span style="text-transform:capitalize">${P.rateType}</span></div><div class="rc-row"><span>Total</span><span>$${amount.toFixed(2)}</span></div></div>
          <button class="btn bt" style="width:100%;justify-content:center" onclick="portalGoToPay()">Proceed to Payment →</button>
        </div>
      </div>`;
  },
  pay(){
    const loc=S.locs.find(l=>l.id===P.selLocId);if(!loc)return'';
    const rateMap={hourly:Math.min(P.duration*loc.rates.hourly,loc.rates.daily),daily:loc.rates.daily,event:loc.rates.event,overnight:loc.rates.overnight};
    const amount=rateMap[P.rateType]||loc.rates.hourly;const tax=amount*.0875;
    return`
      <div class="back-link" onclick="P.step='book';renderPortal()">← Back</div>
      <div style="margin-top:10px" class="pstep">
        <div class="psh"><div class="ps-num">3</div><div class="ps-title">Payment</div></div>
        <div class="psb">
          <div class="pay-methods">
            ${[{id:'card',ico:'💳',lbl:'Credit Card'},{id:'apple',ico:'',lbl:'Apple Pay'},{id:'google',ico:'🔵',lbl:'Google Pay'}].map(m=>`<div class="pay-m${P.payMethod===m.id?' sel':''}" onclick="P.payMethod='${m.id}';renderPortal()"><div class="pay-m-icon">${m.ico}</div><div class="pay-m-lbl">${m.lbl}</div></div>`).join('')}
          </div>
          ${P.payMethod==='card'?`
            <label class="flbl">Card Number</label><input class="fi" placeholder="4242 4242 4242 4242" style="font-family:var(--mono)">
            <div class="fg2"><div><label class="flbl">Expiry</label><input class="fi" placeholder="MM / YY" style="font-family:var(--mono)"></div><div><label class="flbl">CVC</label><input class="fi" placeholder="123" style="font-family:var(--mono)"></div></div>
            <label class="flbl">Name on Card</label><input class="fi" value="${P.name}">`:
          `<div class="alert-box i">⚠ You'll be redirected to complete payment securely.</div>`}
          <div style="background:var(--bg);border-radius:10px;padding:13px;margin:12px 0">
            ${[{l:'Parking',v:`$${amount.toFixed(2)}`},{l:'Tax (8.75%)',v:`$${tax.toFixed(2)}`},{l:'Total',v:`$${(amount+tax).toFixed(2)}`}].map((r,i)=>`<div class="fb" style="font-size:${i===2?'15px':'13px'};font-weight:${i===2?700:400};padding:5px 0;${i===2?'border-top:2px solid var(--navy);padding-top:8px;margin-top:5px':''}"><span style="color:var(--mu)">${r.l}</span><span style="font-family:var(--mono);${i===2?'color:var(--teal)':''}">${r.v}</span></div>`).join('')}
          </div>
          <button class="btn bt" style="width:100%;justify-content:center;font-size:14px;padding:12px" onclick="portalPay(${amount})">🔒 Pay $${(amount+tax).toFixed(2)}</button>
          <div style="text-align:center;font-size:10px;color:var(--dim);margin-top:8px">Secured by APS Pay · SSL encrypted</div>
        </div>
      </div>`;
  },
  confirm(){
    const loc=S.locs.find(l=>l.id===P.selLocId);if(!loc)return'';
    const rateMap={hourly:Math.min(P.duration*loc.rates.hourly,loc.rates.daily),daily:loc.rates.daily,event:loc.rates.event,overnight:loc.rates.overnight};
    const amount=rateMap[P.rateType]||loc.rates.hourly;const tax=amount*.0875;
    const qcells=Array.from({length:100},()=>Math.random()>.42?'var(--navy)':'#fff');
    [0,1,10,11,88,89,98,99,8,9,18,19,80,81,90,91].forEach(i=>qcells[i]='var(--navy)');
    return`
      <div style="text-align:center;padding:10px 0 20px">
        <div style="width:60px;height:60px;background:var(--glt);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px">✓</div>
        <div style="font-family:var(--serif);font-size:26px;color:var(--navy);margin-bottom:6px">Booking Confirmed!</div>
        <div style="font-size:13px;color:var(--mu)">A receipt has been sent to ${P.email||'your email'}</div>
      </div>
      <div class="pstep">
        <div class="psh"><div class="ps-num done">✓</div><div class="ps-title">Confirmation — ${P.confirmCode}</div></div>
        <div class="psb">
          <div class="qr-wrap"><div class="qr-grid">${qcells.map(c=>`<div class="qr-cell" style="background:${c}"></div>`).join('')}</div></div>
          <div style="text-align:center;font-family:var(--mono);font-size:18px;font-weight:700;color:var(--navy);margin-bottom:16px">${P.confirmCode}</div>
          <div class="receipt-box">
            ${[{l:'Name',v:P.name||'Guest'},{l:'Plate',v:P.plate||'—'},{l:'Location',v:loc.name},{l:'Parking Type',v:P.rateType},{l:'Date',v:new Date().toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric'})},{l:'Subtotal',v:`$${amount.toFixed(2)}`},{l:'Tax (8.75%)',v:`$${tax.toFixed(2)}`},{l:'Total Paid',v:`$${(amount+tax).toFixed(2)}`}].map(r=>`<div class="receipt-row"><span style="color:var(--mu)">${r.l}</span><span style="font-weight:${r.l==='Total Paid'?700:400};color:${r.l==='Total Paid'?'var(--green)':'var(--text)'};font-family:var(--mono)">${r.v}</span></div>`).join('')}
          </div>
          <div style="display:flex;gap:10px"><button class="btn bo" style="flex:1" onclick="toast('Receipt sent')">📧 Email Receipt</button><button class="btn bo" style="flex:1" onclick="toast('Downloaded')">⬇ Download PDF</button></div>
          <div class="alert-box i" style="margin-top:14px">⚠ <div><b>Show QR code on entry.</b> Or use plate <span style="font-family:var(--mono);font-weight:700">${P.plate||'—'}</span> at the kiosk.</div></div>
          <button class="btn bt" style="width:100%;justify-content:center;margin-top:10px" onclick="P.step='find';P.plate='';P.name='';P.email='';P.phone='';renderPortal()">Park Again</button>
        </div>
      </div>`;
  }
};

function portalGoToPay(){
  P.name=document.getElementById('p-name')?.value||P.name;
  P.plate=(document.getElementById('p-plate')?.value||P.plate).toUpperCase();
  P.email=document.getElementById('p-email')?.value||P.email;
  P.phone=document.getElementById('p-phone')?.value||P.phone;
  if(!P.plate){toast('Plate required','err');renderPortal();return;}
  P.step='pay';renderPortal();
}
function portalPay(amount){
  P.confirmCode='PARK-'+uid().slice(0,4).toUpperCase();
  const loc=S.locs.find(l=>l.id===P.selLocId);
  if(loc){
    const id='S'+String(++sesSeq).padStart(3,'0');
    S.sessions.push({id,locId:P.selLocId,lvlId:'',space:'',plate:P.plate,make:'',color:'',type:P.rateType,entryAt:Date.now(),payS:'paid',rate:parseFloat(amount),paid:parseFloat(amount),note:`Portal booking ${P.confirmCode}`,exitAt:null});
    loc.occ=Math.min(loc.occ+1,loc.cap);save();
  }
  P.step='confirm';renderPortal();
}

// ═══ MODAL ════════════════════════════════════════════════════
function showModal(title,body,foot,lg=false){$('modal-title').textContent=title;$('modal-body').innerHTML=body;$('modal-foot').innerHTML=foot;$('modal-box').className='modal-box'+(lg?' lg':'');$('overlay').classList.add('open');}
function closeModal(){$('overlay').classList.remove('open');$('modal-body').innerHTML='';}

// ═══ TOAST ════════════════════════════════════════════════════
function toast(msg,tp='default'){const el=document.createElement('div');el.className='toast'+(tp!=='default'?' '+tp:'');el.textContent=msg;$('toasts').appendChild(el);setTimeout(()=>{el.style.transition='opacity .3s';el.style.opacity='0';},2800);setTimeout(()=>el.remove(),3100);}

// ═══ BOOT ══════════════════════════════════════════════════════
// Load Square SDK if already connected
if(S.squareCfg.connected && IS_HTTPS) sqLoadSDK();

// Live refresh every 10s on active data pages
setInterval(()=>{
  if(['daily','liveview','lpr','sessions'].includes(S.page)){
    const el=$('content');
    if(el&&PAGES[S.page])el.innerHTML=PAGES[S.page]();
  }
},10000);

render();
</script>
