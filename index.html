<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>APS — Avid Parking Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --bg:#F0F4FB;--sur:#fff;--sur2:#FAFBFE;--navy:#0A1628;--blue:#2563EB;--blt:#EEF3FF;--bmid:#93AEFE;
  --green:#059669;--glt:#ECFDF5;--gbrd:#A7F3D0;--red:#DC2626;--rlt:#FEF2F2;--rbrd:#FECACA;
  --amber:#D97706;--alt:#FFFBEB;--abrd:#FDE68A;--purple:#7C3AED;--plt:#F5F3FF;
  --teal:#0D7A5F;--tlt:#E8F5F0;--tbd:#90CDB8;
  --brd:#DDE5F2;--mu:#64748B;--dim:#94A3B8;--text:#1A2236;
  --sw:232px;--sans:'DM Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;--serif:'DM Serif Display',Georgia,serif;
  --sh:0 1px 8px rgba(10,22,40,.06);--shm:0 4px 20px rgba(10,22,40,.10);--shl:0 12px 40px rgba(10,22,40,.15)
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}

/* Shell */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sw);min-width:var(--sw);background:var(--navy);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:52px;min-height:52px;background:var(--sur);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:18px}
#content.np{padding:0;gap:0}

/* Sidebar */
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:11px}
.sb-icon{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.sb-name{font-size:14px;font-weight:700;color:#fff}.sb-sub{font-size:9px;color:rgba(255,255,255,.28);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em}
.client-sw{margin:10px 10px 0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:9px 12px;cursor:pointer;transition:.15s;user-select:none}
.client-sw:hover{background:rgba(255,255,255,.08)}
.cs-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.28);margin-bottom:3px}
.cs-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.cs-name{font-size:12px;font-weight:600;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-sec{padding:0 8px;margin-bottom:16px}
.sb-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.2);padding:0 8px;margin-bottom:4px}
.nv{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:400;color:rgba(255,255,255,.42);transition:.12s;margin-bottom:1px;position:relative;user-select:none;border:none;background:transparent;width:100%;text-align:left}
.nv:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.82)}
.nv.on{background:rgba(37,99,235,.22);color:#fff;font-weight:600}
.nv.on::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--blue);border-radius:0 2px 2px 0}
.nv-bd{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;font-family:var(--mono)}
.sb-foot{padding:12px 10px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer}
.sb-user:hover{background:rgba(255,255,255,.06)}
.av{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#2563EB,#4F46E5);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;font-family:var(--mono)}
.sb-un{font-size:12px;font-weight:600;color:rgba(255,255,255,.82)}.sb-ur{font-size:10px;color:rgba(255,255,255,.32);font-family:var(--mono)}

/* Topbar */
.tb-title{font-size:15px;font-weight:700;color:var(--navy);flex:1}.tb-sub{font-size:12px;font-weight:400;color:var(--mu);margin-left:6px}
.tb-time{font-family:var(--mono);font-size:11px;color:var(--mu)}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--glt);border:1px solid var(--gbrd);padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;color:var(--green);font-family:var(--mono)}
.ldot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Cards */
.card{background:var(--sur);border:1px solid var(--brd);border-radius:14px;box-shadow:var(--sh);overflow:hidden}
.ch{padding:13px 18px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);display:flex;align-items:center;gap:7px}
.cb{padding:16px 18px}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.met{background:var(--sur);border:1px solid var(--brd);border-radius:13px;padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.met::after{content:'';position:absolute;top:0;left:0;right:0;height:2.5px}
.met.bl::after{background:var(--blue)}.met.gr::after{background:var(--green)}.met.am::after{background:var(--amber)}.met.pu::after{background:var(--purple)}.met.te::after{background:var(--teal)}.met.re::after{background:var(--red)}
.ml{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);margin-bottom:8px}
.mv{font-family:var(--serif);font-size:30px;line-height:1;font-style:italic}
.mv.bl{color:var(--blue)}.mv.gr{color:var(--green)}.mv.am{color:var(--amber)}.mv.pu{color:var(--purple)}.mv.te{color:var(--teal)}.mv.re{color:var(--red)}
.ms{font-size:11px;color:var(--mu);margin-top:6px}.mup{color:var(--green);font-weight:600}.mdn{color:var(--red);font-weight:600}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);transition:all .12s;white-space:nowrap;line-height:1;text-decoration:none}
.btn:hover{opacity:.88;transform:translateY(-1px)}.btn:active{transform:translateY(0)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;pointer-events:none}
.bp{background:var(--blue);color:#fff;box-shadow:0 2px 10px rgba(37,99,235,.25)}
.bo{background:var(--sur);border:1.5px solid var(--brd);color:var(--mu)}
.bs{background:var(--green);color:#fff}.bd{background:var(--rlt);color:var(--red);border:1px solid var(--rbrd)}
.bw{background:var(--alt);color:var(--amber);border:1px solid var(--abrd)}
.bt{background:var(--teal);color:#fff;box-shadow:0 2px 8px rgba(13,122,95,.22)}
.bsm{padding:5px 10px;font-size:11.5px;border-radius:7px}.bxs{padding:4px 8px;font-size:10.5px;border-radius:6px}

/* Badges */
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono);border:1px solid transparent}
.ba{background:var(--glt);color:var(--green);border-color:var(--gbrd)}
.bu{background:var(--rlt);color:var(--red);border-color:var(--rbrd)}
.bm{background:var(--blt);color:var(--blue);border-color:var(--bmid)}
.bam{background:var(--alt);color:var(--amber);border-color:var(--abrd)}
.bpu{background:var(--plt);color:var(--purple)}
.bg2{background:#F1F5F9;color:var(--dim)}
.bteal{background:var(--tlt);color:var(--teal);border-color:var(--tbd)}

/* Tables */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 14px;font-size:9.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--dim);border-bottom:1px solid var(--brd);background:var(--sur2);font-weight:600}
.tbl td{padding:11px 14px;font-size:12.5px;border-bottom:1px solid var(--brd);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}.tbl tbody tr:hover td{background:var(--sur2)}
.ptag{font-family:var(--mono);font-size:12px;font-weight:600;background:#F1F5F9;padding:3px 8px;border-radius:5px;border:1px solid var(--brd);letter-spacing:.05em}
.money{font-family:var(--mono);font-size:12px;font-weight:600}

/* Forms */
.flbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mu);display:block;margin-bottom:5px}
.fi{width:100%;background:var(--sur2);border:1.5px solid var(--brd);border-radius:9px;padding:9px 12px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s;margin-bottom:13px;-webkit-appearance:none}
.fi:focus{border-color:var(--blue);background:var(--sur)}
.fi.mono{font-family:var(--mono);font-weight:600;text-transform:uppercase;font-size:15px;letter-spacing:.06em}
.fi.big{font-size:18px;letter-spacing:3px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fg4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* Toggle */
.tog{position:relative;width:38px;height:22px;cursor:pointer;display:inline-flex;align-items:center;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;background:#CBD5E1;border-radius:22px;transition:.2s;pointer-events:none}
.tog-sl::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.tog input:checked+.tog-sl{background:var(--green)}.tog input:checked+.tog-sl::before{transform:translateX(16px)}

/* Modal */
#overlay{position:fixed;inset:0;background:rgba(10,22,40,.52);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
#overlay.open{display:flex;animation:fIn .15s ease}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--sur);border-radius:16px;width:100%;max-width:480px;box-shadow:var(--shl);animation:sUp .18s ease;max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
.modal-box.lg{max-width:640px}
@keyframes sUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mt2{font-family:var(--serif);font-size:20px;color:var(--navy)}
.mb{padding:18px 22px;overflow-y:auto;flex:1}.mf{padding:13px 22px;border-top:1px solid var(--brd);display:flex;gap:9px;justify-content:flex-end;flex-shrink:0;background:var(--sur2)}

/* Toast */
#toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:var(--navy);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shl);animation:tIn .25s ease;white-space:nowrap}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}.toast.warn{background:var(--amber);color:var(--navy)}
@keyframes tIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Layout helpers */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.fb{display:flex;align-items:center;justify-content:space-between}
.fr{display:flex;align-items:center;gap:8px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.pt{font-family:var(--serif);font-size:24px;color:var(--navy)}
.ps{font-size:12px;color:var(--mu);margin-top:2px;margin-bottom:14px}
.slbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--brd)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--brd);background:var(--sur);color:var(--mu);transition:.12s}
.chip:hover{border-color:var(--navy);color:var(--navy)}.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.tabs{display:flex;border-bottom:1px solid var(--brd)}
.tab{padding:10px 16px;font-size:12.5px;cursor:pointer;color:var(--mu);border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:.12s;font-weight:500;user-select:none}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tabb{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;display:inline-block;margin-left:4px}
.ob{height:5px;background:var(--brd);border-radius:3px;overflow:hidden;margin:5px 0 3px}
.of{height:100%;border-radius:3px;transition:width .5s}
.empty{text-align:center;padding:36px 20px;color:var(--dim);font-size:13px}
.alert-box{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:10px;font-size:12.5px;margin-bottom:14px}
.alert-box.w{background:var(--alt);border:1.5px solid var(--abrd);color:var(--amber)}
.alert-box.d{background:var(--rlt);border:1.5px solid var(--rbrd);color:var(--red)}
.alert-box.i{background:var(--blt);border:1.5px solid var(--bmid);color:var(--blue)}
.alert-box.s{background:var(--glt);border:1.5px solid var(--gbrd);color:var(--green)}
.alert-box.t{background:var(--tlt);border:1.5px solid var(--tbd);color:var(--teal)}

/* Rate calc preview */
.rate-calc{background:var(--tlt);border:1.5px solid var(--tbd);border-radius:9px;padding:13px 15px;margin-bottom:13px}
.rc-row{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
.rc-row:last-child{border-top:1px solid var(--tbd);padding-top:7px;margin-top:7px;font-weight:700;font-size:14px;color:var(--teal);margin-bottom:0}

/* Entry/Exit panels */
.ee-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.ee-panel{border:2px solid var(--brd);border-radius:13px;padding:18px;background:var(--sur)}
.ee-title{font-family:var(--serif);font-size:20px;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.exit-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--sur);border:1.5px solid var(--brd);border-radius:9px;box-shadow:var(--shm);z-index:50;display:none;max-height:200px;overflow-y:auto;margin-top:4px}
.exit-match{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--brd);transition:background .1s}
.exit-match:hover{background:var(--tlt)}.exit-match:last-child{border-bottom:none}

/* Live view spaces */
.space-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:8px;padding:14px}
.sp{border:1.5px solid var(--brd);border-radius:9px;padding:8px 5px;text-align:center;font-size:10px;font-family:var(--mono);cursor:pointer;transition:all .12s;position:relative}
.sp.empty{border-color:var(--gbrd);background:var(--glt);color:var(--green)}
.sp.occupied{border-color:var(--rbrd);background:var(--rlt);color:var(--red)}
.sp.reserved{border-color:var(--bmid);background:var(--blt);color:var(--blue)}
.sp.permit{border-color:var(--tbd);background:var(--tlt);color:var(--teal)}
.sp:hover{transform:scale(1.05);box-shadow:var(--shm)}
.sp-plate{font-size:9px;font-weight:600;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Monthly split */
.split{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 52px);overflow:hidden}
.split-l{background:var(--sur);border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}
.split-r{overflow-y:auto;display:flex;flex-direction:column}
.ai{padding:13px 16px;border-bottom:1px solid var(--brd);cursor:pointer;transition:background .1s;user-select:none}
.ai:hover{background:var(--blt)}.ai.on{background:var(--blt);border-right:3px solid var(--blue)}
.sw2{position:relative}.sw2-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none;font-size:13px}
.sinp{width:100%;background:var(--sur2);border:1.5px solid var(--brd);border-radius:9px;padding:8px 12px 8px 34px;font-size:12.5px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s}
.sinp:focus{border-color:var(--blue);background:var(--sur)}
.ig{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ic{background:var(--bg);border-radius:9px;padding:11px 13px}
.il{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:4px}
.iv{font-size:13px;font-weight:600;color:var(--navy)}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.sc{background:var(--sur);border:1px solid var(--brd);border-radius:11px;padding:14px;text-align:center;box-shadow:var(--sh)}
.sv{font-family:var(--serif);font-size:26px;color:var(--navy);line-height:1;font-style:italic}.sl{font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--mu);margin-top:4px}
.vc{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg);border-radius:10px;border:1.5px solid var(--brd);margin-bottom:8px}
.itbl{width:100%;border-collapse:collapse}.itbl th{padding:8px 12px;font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:var(--dim);text-align:left;border-bottom:1px solid var(--brd);background:var(--bg)}
.itbl td{padding:10px 12px;font-size:12px;border-bottom:1px solid var(--brd);vertical-align:middle}.itbl tr:last-child td{border-bottom:none}
.nbox{width:100%;background:var(--bg);border:1.5px solid var(--brd);border-radius:9px;padding:11px 13px;font-size:13px;color:var(--text);min-height:80px;resize:vertical;outline:none;font-family:var(--sans);line-height:1.6}
.nbox:focus{border-color:var(--blue)}
.bc{display:flex;align-items:flex-end;gap:5px;height:100px}
.bg-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-stack{width:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:1px;height:85px}
.bar-seg{border-radius:2px 2px 0 0;min-height:2px}
.bar-lbl{font-size:9px;color:var(--dim);font-family:var(--mono)}
.rate-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:10px}
.rate-item{background:var(--sur2);border:1px solid var(--brd);border-radius:10px;padding:12px;text-align:center}
.rate-amt{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--teal)}
.rate-lbl{font-size:10px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-top:3px}

/* Wizard */
.wiz{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 52px);overflow:hidden}
.wiz-rail{background:var(--navy);display:flex;flex-direction:column;overflow:hidden}
.ws{display:flex;align-items:center;gap:12px;padding:10px 18px;cursor:pointer;user-select:none}
.ws.on{background:rgba(37,99,235,.2)}.ws.done .wn{background:var(--green);border-color:var(--green);color:#fff}
.wn{width:26px;height:26px;border-radius:7px;border:1.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:600;color:rgba(255,255,255,.35);flex-shrink:0;transition:all .2s}
.ws.on .wn{border-color:var(--blue);background:var(--blue);color:#fff}

// ── Charge calculation — 30-minute block billing (transient only) ──
function calcCharge(session,end){
  if(session.type==='monthly'||session.type==='permit')return 0;
  if(session.type==='daily'||session.type==='event'||session.type==='overnight')return session.rate;
  if(session.type==='validated'||session.type==='free')return 0;
  const loc=S.locs.find(l=>l.id===session.locId);
  const elapsedMs=((end||Date.now())-session.entryAt);
  const mins=elapsedMs/60000;
  const grace=loc?.rates?.graceMins||5;
  if(mins<=grace)return 0;
  const billableMins=Math.max(0,mins-grace);
  // Round up to next 30-minute block, charge at half-hourly rate
  const halfHours=Math.ceil(billableMins/30);
  const ratePerHalf=loc?.rates?.ratePerHalf||(session.rate/2);
  const charge=Math.round(halfHours*ratePerHalf*100)/100;
  const dailyCap=(loc?.rates?.daily)||40;
  return Math.min(charge,dailyCap);
}
function chargeBreakdown(session,end){
  const loc=S.locs.find(l=>l.id===session.locId);
  const ms=((end||Date.now())-session.entryAt);
  const mins=ms/60000;
  const grace=loc?.rates?.graceMins||5;
  const billableMins=Math.max(0,mins-grace);
  const halfHours=Math.ceil(billableMins/30);
  const ratePerHalf=loc?.rates?.ratePerHalf||(session.rate/2);
  return{totalMins:mins.toFixed(1),graceMins:grace,billableMins:billableMins.toFixed(1),halfHours,ratePerHalf,charge:calcCharge(session,end)};
}
// Human-readable duration with minutes precision
function durMin(ms){
  const m=Math.floor(ms/60000);
  if(m<60)return m+'m';
  const h=Math.floor(m/60),rm=m%60;
  return h+'h '+(rm>0?rm+'m':'');
}
// Duration from entryAt to now (or exitAt), with seconds for live display
function durLive(entryAt,exitAt){
  const ms=(exitAt||Date.now())-entryAt;
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  if(h>0)return `${h}h ${String(m).padStart(2,'0')}m`;
  return `${m}m ${String(s).padStart(2,'0')}s`;
}

function rtBadge(type){
  const m={hourly:'bl',daily:'te',event:'pu',overnight:'am',monthly:'ba',permit:'ba',validated:'bg2',free:'bg2'};
  const labels={hourly:'hourly',daily:'daily flat',event:'event',overnight:'overnight',monthly:'monthly',permit:'permit',validated:'validated',free:'free'};
  const cls=m[type]||'bg2';return`<span class="bdg b${cls}">${labels[type]||type}</span>`;
}

    const exitLoc=locs.find(l=>l.id===exitSel.locId);
    const elapsedMs=Date.now()-exitSel.entryAt;
    const elapsedMins=(elapsedMs/60000).toFixed(1);
    const grace=exitLoc?.rates?.graceMins||5;
    const rpm=exitLoc?.rates?.ratePerHalf||(exitSel.rate/2); // $/30-min block
    const billableMins=Math.max(0,elapsedMs/60000-grace).toFixed(1);
    exitSection=`
      <div style="background:var(--glt);border:1.5px solid var(--gbrd);border-radius:10px;padding:14px;margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="font-family:var(--mono);font-size:22px;font-weight:700">${exitSel.plate}</div>
          ${rtBadge(exitSel.type)}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px">
          ${[{l:'Location',v:exitLoc?.name||'—'},{l:'Space',v:exitSel.space||'—'},{l:'Entry',v:fmtDT(exitSel.entryAt)},{l:'Duration',v:durLive(exitSel.entryAt)}].map(r=>`<div style="background:rgba(255,255,255,.7);border-radius:7px;padding:6px 10px"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--mu)">${r.l}</div><div style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--navy)">${r.v}</div></div>`).join('')}
        </div>
      </div>
      ${!isPerm?`<div class="rate-calc">
        <div class="rc-row"><span>Total time</span><span style="font-family:var(--mono)">${parseFloat(exitLoc?((Date.now()-exitSel.entryAt)/60000).toFixed(1):0)} min</span></div>
        <div class="rc-row"><span style="color:var(--amber)">Grace (free)</span><span style="font-family:var(--mono);color:var(--amber)">− ${grace} min</span></div>
        <div class="rc-row"><span>Billable blocks</span><span style="font-family:var(--mono)">${Math.ceil(Math.max(0,(Date.now()-exitSel.entryAt)/60000-grace)/30)} × 30-min @ ${c$(exitLoc?.rates?.ratePerHalf||exitSel.rate/2)}</span></div>
        <div class="rc-row"><span>Tax (8.75%)</span><span style="font-family:var(--mono)">${c$(charge*.0875)}</span></div>
        <div class="rc-row"><span>Total due</span><span>${c$(charge*1.0875)}</span></div>
      </div>`:`<div class="alert-box s">◈ Monthly permit — no charge on exit. Gate opens automatically.</div>`}
      <div style="display:flex;gap:8px">
        <button class="btn bo" style="flex:1" onclick="S.exitSelId=null;S.exitQ='';renderContent()">Cancel</button>
        <button class="btn bs" style="flex:2;font-size:14px;padding:11px" onclick="processExit('${exitSel.id}')">✓ Complete Exit${!isPerm?` — ${c$(charge*1.0875)}`:''}</button>
      </div>`;
  } else {
    exitSection=`
      <div style="position:relative;margin-bottom:10px">
        <input id="ex-q" class="fi mono" style="font-size:16px;padding-left:14px" placeholder="Type 3+ chars to search plate…" value="${S.exitQ}" oninput="S.exitQ=this.value.toUpperCase();renderContent()" autocapitalize="characters" autocorrect="off" spellcheck="false">
      </div>
      ${matches.length>0?`<div style="border:1.5px solid var(--brd);border-radius:9px;overflow:hidden;margin-bottom:10px">
        ${matches.map(s=>{const loc=locs.find(l=>l.id===s.locId);return`<div class="exit-match" onclick="S.exitSelId='${s.id}';renderContent()"><div class="fb"><span class="ptag">${s.plate}</span><span style="font-family:var(--mono);font-size:11px;color:var(--mu)">${dur(s.entryAt)}</span></div><div style="font-size:11px;color:var(--mu);margin-top:3px">${ex(s.make||'')} ${ex(s.color||'')} · ${loc?.name||'—'} ${s.space?'· Space '+s.space:''}</div></div>`;}).join('')}
      </div>`:(q.length>=2?`<div style="padding:10px 12px;background:var(--rlt);border-radius:8px;font-size:12px;color:var(--red)">No active sessions found for "${S.exitQ}"</div>`:`<div style="text-align:center;padding:24px;color:var(--dim)"><div style="font-size:32px;margin-bottom:8px">🔍</div><div>Search a plate above to process exit</div></div>`)}`;
  }

  const activeRows=active.map(s=>{
    const loc=locs.find(l=>l.id===s.locId);
    const charge=calcCharge(s);
    const isPerm=s.type==='monthly'||s.type==='permit';
    const grace=loc?.rates?.graceMins||5;
    const inGrace=(Date.now()-s.entryAt)<grace*60000;
    return`<tr><td><span class="ptag">${s.plate}</span></td><td style="font-size:11px;color:var(--mu)">${loc?.name||'—'}</td><td style="font-size:11px;color:var(--mu)">${s.space||'—'}</td><td style="font-family:var(--mono);font-size:11px;color:var(--mu)">${fmtDT(s.entryAt)}</td><td style="font-family:var(--mono);font-size:12px">${durLive(s.entryAt)}</td><td>${rtBadge(s.type)}</td><td class="money" style="color:${isPerm?'var(--mu)':inGrace?'var(--amber)':'var(--teal)'}">${isPerm?'N/C':inGrace?`🟡 $0.00`:c$(charge)}</td><td onclick="event.stopPropagation()"><button class="btn bd bxs" onclick="S.exitSelId='${s.id}';S.exitQ='${s.plate}';go('daily')">Exit</button><button class="btn bp bxs" onclick="openTicket('${s.id}')">🎫</button></td></tr>`;
  });

  return`
    <div class="ph"><div><div class="pt">Daily Parking — Entry / Exit</div><div class="ps">Log vehicle entry and process payments</div></div></div>
    <div class="ee-grid">
      <!-- ENTRY PANEL -->
      <div class="ee-panel" style="border-color:var(--gbrd);background:var(--sur)">
        <div class="ee-title">🟢 Vehicle Entry</div>
        <label class="flbl">License Plate *</label>
        <input id="e-plate" class="fi mono big" placeholder="ABC-1234" autocapitalize="characters" autocorrect="off" spellcheck="false" oninput="this.value=this.value.toUpperCase()">
        <div class="fg2">
          <div><label class="flbl">Location *</label>
            <select id="e-loc" class="fi" oninput="S.entryLocId=this.value;renderContent()">
              <option value="">Select…</option>${locOpts}
            </select>
          </div>
          <div><label class="flbl">Level</label>
            <select id="e-lvl" class="fi">${selLoc?`<option value="">Any</option>${lvlOpts}`:'<option value="">—</option>'}</select>
          </div>
        </div>
        <div class="fg2">
          <div><label class="flbl">Space #</label><input id="e-space" class="fi mono" placeholder="A-01"></div>
          <div><label class="flbl">Rate Type *</label>
            <select id="e-rate" class="fi" oninput="updateEntryPreview()">
              <option value="hourly">Hourly${selLoc?` — $${selLoc.rates.hourly}/hr`:''}</option>
              <option value="daily">Daily Flat${selLoc?` — $${selLoc.rates.daily}`:''}</option>
              <option value="event">Event${selLoc?` — $${selLoc.rates.event}`:''}</option>
              <option value="overnight">Overnight${selLoc?` — $${selLoc.rates.overnight}`:''}</option>
              <option value="monthly">Monthly Permit</option>
            </select>
          </div>
        </div>
        ${selLoc?`<div id="entry-preview" class="rate-calc">
          <div class="rc-row"><span>Type</span><span id="ep-type" style="font-family:var(--mono)">Hourly</span></div>
          <div class="rc-row"><span>Rate</span><span id="ep-rate" style="font-family:var(--mono);color:var(--teal)">$${selLoc.rates.hourly}/hr</span></div>
          <div class="rc-row"><span>Daily cap</span><span style="font-family:var(--mono)">$${selLoc.rates.daily}</span></div>
        </div>`:''}
        <div class="fg2">
          <div><label class="flbl">Make</label><input id="e-make" class="fi" placeholder="e.g. Toyota"></div>
          <div><label class="flbl">Color</label><input id="e-color" class="fi" placeholder="e.g. Silver"></div>
        </div>
        <label class="flbl">Note</label><input id="e-note" class="fi" placeholder="Attendant name or notes">
        <button class="btn bs" style="width:100%;justify-content:center;font-size:14px" onclick="processEntry()">✓ Log Entry</button>
      </div>
      <!-- EXIT PANEL -->
      <div class="ee-panel" style="border-color:var(--rbrd);background:var(--sur)">
        <div class="ee-title">🔴 Vehicle Exit</div>
        <label class="flbl">License Plate Lookup</label>
        ${exitSection}
      </div>
    </div>
    <!-- ACTIVE SESSIONS TABLE -->
    <div class="card"><div class="ch"><div class="ct">🚗 Active Sessions <span style="font-family:var(--mono);font-size:10px;color:var(--mu);font-weight:400">${active.length} vehicles</span></div><button class="btn bo bsm" onclick="go('sessions')">View All</button></div>
      ${active.length===0?'<div class="empty">No active sessions</div>':`<table class="tbl"><thead><tr><th>Plate</th><th>Location</th><th>Space</th><th>Entry</th><th>Duration</th><th>Type</th><th>Est. Charge</th><th>Exit</th></tr></thead><tbody>${activeRows.join('')}</tbody></table>`}
    </div>`;
}

function updateEntryPreview(){
  const locId=document.getElementById('e-loc')?.value;
  const rt=document.getElementById('e-rate')?.value||'hourly';
  const loc=S.locs.find(l=>l.id===locId);if(!loc)return;
  const labels={hourly:`$${loc.rates.hourly}/hr`,daily:`$${loc.rates.daily} flat`,event:`$${loc.rates.event} flat`,overnight:`$${loc.rates.overnight} flat`,monthly:'No charge'};
  const tl={hourly:'Hourly',daily:'Daily Flat',event:'Event',overnight:'Overnight',monthly:'Monthly Permit'};
  const ep=$('ep-type');const er=$('ep-rate');
  if(ep)ep.textContent=tl[rt]||rt;if(er)er.textContent=labels[rt]||'—';
}

function processEntry(){
  const plate=(document.getElementById('e-plate')?.value||'').trim().toUpperCase();
  const locId=document.getElementById('e-loc')?.value;
  if(!plate){toast('Enter a license plate','err');return;}
  if(!locId){toast('Select a location','err');return;}
  const dup=S.sessions.find(s=>!s.exitAt&&s.plate===plate&&s.locId===locId);
  if(dup){toast(`${plate} already has an active session here`,'err');return;}
  const loc=S.locs.find(l=>l.id===locId);
  const rt=document.getElementById('e-rate')?.value||'hourly';
  const rateMap={hourly:loc.rates.hourly,daily:loc.rates.daily,event:loc.rates.event,overnight:loc.rates.overnight,monthly:0};
  const space=(document.getElementById('e-space')?.value||'').toUpperCase().trim();
  const lvlId=document.getElementById('e-lvl')?.value||'';
  const id='S'+String(++sesSeq).padStart(3,'0');
  S.sessions.push({id,locId,lvlId,space,plate,make:(document.getElementById('e-make')?.value||'').trim(),color:(document.getElementById('e-color')?.value||'').trim(),type:rt,entryAt:Date.now(),payS:rt==='monthly'?'permit':'pending',rate:rateMap[rt]||0,paid:0,note:(document.getElementById('e-note')?.value||'').trim(),exitAt:null});
  if(space&&lvlId){const lvl=loc.levels.find(lv=>lv.id===lvlId);const sp=lvl?.spaces.find(x=>x.num===space);if(sp){sp.st='occupied';sp.plate=plate;}}
  loc.occ=Math.min(loc.occ+1,loc.cap);
  save();S.exitQ='';S.exitSelId=null;renderContent();toast(`✓ Entry logged: ${plate} · ${rt}`,'ok');
}

function processExit(id){
  const s=S.sessions.find(x=>x.id===id);if(!s)return;
  const charge=calcCharge(s);
  s.exitAt=Date.now();s.amount=charge;s.paid=charge;s.payS=s.type==='monthly'||s.type==='permit'?'permit':'paid';
  if(s.lvlId&&s.space){const loc=S.locs.find(l=>l.id===s.locId);const lvl=loc?.levels.find(lv=>lv.id===s.lvlId);const sp=lvl?.spaces.find(x=>x.num===s.space);if(sp){sp.st='empty';sp.plate='';}}
  const loc=S.locs.find(l=>l.id===s.locId);if(loc)loc.occ=Math.max(0,loc.occ-1);
  save();S.exitSelId=null;S.exitQ='';renderContent();toast(`Exit: ${s.plate} · ${charge>0?c$(charge):'No charge'}`,'ok');
}

// ═══ LIVE VIEW ════════════════════════════════════════════════
function pgLiveView(){
  const locs=S.locs;
  const sel=S.liveLocId||locs[0]?.id;
  const loc=locs.find(l=>l.id===sel);if(!loc)return`<div class="empty">No locations</div>`;
  const lvlSel=S.liveLvlId||loc.levels[0]?.id;
  const lvl=loc.levels.find(lv=>lv.id===lvlSel)||loc.levels[0];
  const occ=loc.levels.reduce((a,lv)=>a+lv.spaces.filter(sp=>sp.st==='occupied').length,0);
  const pct=Math.round(occ/loc.cap*100);
  const spaceHTML=lvl?.spaces.map(sp=>{
    const ses=S.sessions.find(x=>!x.exitAt&&x.space===sp.num&&x.lvlId===lvl.id);
    const plate=ses?.plate||sp.plate;
    const stClass=ses?.type==='monthly'||ses?.type==='permit'?'permit':sp.st;
    return`<div class="sp ${stClass}" title="${sp.num}${plate?' — '+plate:''}${sp.type!=='standard'?' ['+sp.type+']':''}">
      <div>${sp.num}</div>
      ${plate?`<div class="sp-plate">${plate}</div>`:'<div style="font-size:8px;opacity:.4">free</div>'}
      ${sp.type==='ev'?'<div style="font-size:8px;opacity:.7">⚡</div>':''}
    </div>`;
  }).join('')||'';

  return`
    <div class="ph"><div><div class="pt">Live View</div><div class="ps">Real-time space occupancy</div></div><button class="btn bo bsm" onclick="S.locs=mkLocs();save();renderContent()">↺ Refresh</button></div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      ${locs.map(l=>{const o=Math.round(l.occ/l.cap*100);return`<button class="chip${sel===l.id?' on':''}" onclick="S.liveLocId='${l.id}';S.liveLvlId=null;renderContent()">${l.name} <span style="font-family:var(--mono);font-size:10px">${o}%</span></button>`;}).join('')}
    </div>
    <div class="metrics" style="grid-template-columns:repeat(5,1fr)">
      <div class="met te"><div class="ml">Occupancy</div><div class="mv te">${pct}%</div><div class="ms">${occ}/${loc.cap}</div></div>
      <div class="met gr"><div class="ml">Available</div><div class="mv gr">${loc.cap-occ}</div></div>
      <div class="met bl"><div class="ml">Hourly</div><div class="mv bl">${S.sessions.filter(s=>!s.exitAt&&s.locId===sel&&s.type==='hourly').length}</div></div>
      <div class="met am"><div class="ml">Daily</div><div class="mv am">${S.sessions.filter(s=>!s.exitAt&&s.locId===sel&&s.type==='daily').length}</div></div>
      <div class="met pu"><div class="ml">Monthly</div><div class="mv pu">${S.sessions.filter(s=>!s.exitAt&&s.locId===sel&&(s.type==='monthly'||s.type==='permit')).length}</div></div>
    </div>
    <div class="card"><div class="ch" style="gap:10px">
      <div class="ct">📍 ${loc.name}</div>
      <div style="display:flex;gap:6px">
        ${loc.levels.map(lv=>`<button class="chip${lvlSel===lv.id?' on':''}" onclick="S.liveLvlId='${lv.id}';renderContent()">${lv.name}</button>`).join('')}
      </div>
      <div style="display:flex;gap:12px;font-size:11px;color:var(--mu);flex-shrink:0;margin-left:auto">
        ${[{c:'empty',l:'Available'},{c:'occupied',l:'Occupied'},{c:'reserved',l:'Reserved'},{c:'permit',l:'Permit'}].map(l=>`<span style="display:flex;align-items:center;gap:5px"><span class="sp ${l.c}" style="width:12px;height:12px;display:inline-block;padding:0;transform:none;border-radius:3px"></span>${l.l}</span>`).join('')}
      </div>
    </div>
    <div class="space-grid">${spaceHTML||'<div class="empty">No spaces configured</div>'}</div>
    </div>`;
}

// ═══ SESSIONS ════════════════════════════════════════════════
function pgSessions(){
  const all=S.sessions;const q=S.sessQ.toLowerCase();
  const filtered=all.filter(s=>{
    const loc=S.locs.find(l=>l.id===s.locId);
    const mq=!q||s.plate.toLowerCase().includes(q)||(loc?.name||'').toLowerCase().includes(q);
    const f=S.sessFilter;
    const mt=f==='all'||(f==='active'&&!s.exitAt)||(f==='completed'&&s.exitAt)||(f==='unpaid'&&s.payS==='pending'&&!s.exitAt)||(f==='daily'&&s.type==='daily')||(f==='hourly'&&s.type==='hourly')||(f==='monthly'&&(s.type==='monthly'||s.type==='permit'));
    return mq&&mt;
  });
  const unp=all.filter(s=>!s.exitAt&&s.payS==='pending'&&s.type!=='monthly'&&s.type!=='permit').length;
  const rows=filtered.map(s=>{
    const loc=S.locs.find(l=>l.id===s.locId);
    const charge=s.exitAt?c$(s.amount||0):c$(calcCharge(s));
    const statCls=s.exitAt?'ba':s.payS==='permit'?'bteal':s.payS==='pending'?'bu':'ba';
    const statLbl=s.exitAt?'paid':s.payS==='permit'?'permit':s.payS==='pending'?'unpaid':'paid';
    return`<tr><td><span class="ptag">${s.plate}</span></td><td style="font-size:11px;color:var(--mu)">${loc?.name||'—'}</td><td style="font-size:11px;color:var(--mu)">${s.space||'—'}</td><td style="font-family:var(--mono);font-size:11px;color:var(--mu)">${fmtDT(s.entryAt)}</td><td style="font-family:var(--mono);font-size:12px">${s.exitAt?dur(s.entryAt,s.exitAt):dur(s.entryAt)}</td><td>${rtBadge(s.type)}</td><td><span class="bdg ${statCls}">${statLbl}</span></td><td class="money" style="color:${s.type==='monthly'||s.type==='permit'?'var(--mu)':'var(--teal)'}">${s.type==='monthly'||s.type==='permit'?'N/C':charge}</td><td onclick="event.stopPropagation()"><div style="display:flex;gap:4px">${!s.exitAt&&s.payS!=='permit'?`<button class="btn bd bxs" onclick="S.exitSelId='${s.id}';S.exitQ='${s.plate}';go('daily')">Exit</button>`:''}<button class="btn bp bxs" onclick="openTicket('${s.id}')">🎫 Ticket</button><button class="btn bo bxs" onclick="openCorrectModal('${s.id}')">Edit</button></div></td></tr>`;
  });
  return`
    <div class="ph"><div><div class="pt">All Sessions</div><div class="ps">${filtered.length} sessions</div></div><button class="btn bo bsm" onclick="toast('CSV exported')">⬇ Export</button></div>
    <div class="card">
      <div style="padding:12px 16px;border-bottom:1px solid var(--brd);display:flex;gap:12px;align-items:center">
        <div style="flex:1" class="sw2"><span class="sw2-ico">🔍</span><input id="sess-q" class="sinp" placeholder="Search plate or location…" value="${S.sessQ}" oninput="S.sessQ=this.value;renderContent()"></div>
      </div>
      <div class="tabs">
        ${[['all','All',all.length],['active','Active'],['unpaid','Unpaid',unp],['daily','Daily'],['hourly','Hourly'],['monthly','Monthly'],['completed','Completed']].map(([id,lbl,b])=>`<div class="tab${S.sessFilter===id?' on':''}" onclick="S.sessFilter='${id}';renderContent()">${lbl}${b?`<span class="tabb">${b}</span>`:''}</div>`).join('')}
      </div>
      ${filtered.length===0?'<div class="empty">No sessions match</div>':`<table class="tbl"><thead><tr><th>Plate</th><th>Location</th><th>Space</th><th>Entry</th><th>Duration</th><th>Type</th><th>Status</th><th>Amount</th><th>Actions</th></tr></thead><tbody>${rows.join('')}</tbody></table>`}
    </div>`;
}

// ═══ RESERVATIONS ════════════════════════════════════════════
function pgReservations(){
  const filtered=S.reservations.filter(r=>S.resFilter==='all'||r.status===S.resFilter);
  const rows=filtered.map(r=>{
    const loc=S.locs.find(l=>l.id===r.locId);
    return`<tr><td style="font-family:var(--mono);font-size:11px;color:var(--blue)">${r.code}</td><td style="font-weight:600">${r.name}</td><td><span class="ptag">${r.plate}</span></td><td style="font-size:11px;color:var(--mu)">${loc?.name||'—'}</td><td style="font-family:var(--mono);font-size:11px">${fmtDT(r.startAt)}</td><td style="font-size:11px;color:var(--mu)">${dur(r.startAt,r.endAt)}</td><td>${rtBadge(r.rateType)}</td><td class="money" style="color:var(--teal)">${c$(r.amount)}</td><td><span class="bdg b${r.status==='active'?'a':r.status==='upcoming'?'am':r.status==='completed'?'g2':'am'}">${r.status}</span></td><td><button class="btn bo bxs" onclick="viewRes('${r.id}')">View</button></td></tr>`;
  });
  return`
    <div class="ph"><div><div class="pt">Reservations</div><div class="ps">${filtered.length} reservations</div></div><button class="btn bp" onclick="openNewResModal()">＋ New Reservation</button></div>
    <div class="g4" style="margin-bottom:14px">
      ${[{l:'Total',v:S.reservations.length,c:'bl'},{l:'Upcoming',v:S.reservations.filter(r=>r.status==='upcoming').length,c:'am'},{l:'Active',v:S.reservations.filter(r=>r.status==='active').length,c:'te'},{l:'Completed',v:S.reservations.filter(r=>r.status==='completed').length,c:'gr'}].map(s=>`<div class="met ${s.c}"><div class="ml">${s.l}</div><div class="mv ${s.c}">${s.v}</div></div>`).join('')}
    </div>
    <div class="card"><div class="tabs">${['all','upcoming','active','completed'].map(f=>`<div class="tab${S.resFilter===f?' on':''}" onclick="S.resFilter='${f}';renderContent()">${f.charAt(0).toUpperCase()+f.slice(1)}</div>`).join('')}</div>
      ${filtered.length===0?'<div class="empty">No reservations</div>':`<table class="tbl"><thead><tr><th>Confirm #</th><th>Name</th><th>Plate</th><th>Location</th><th>Start</th><th>Duration</th><th>Rate</th><th>Amount</th><th>Status</th><th></th></tr></thead><tbody>${rows.join('')}</tbody></table>`}
    </div>`;
}
function viewRes(id){
  const r=S.reservations.find(x=>x.id===id);if(!r)return;
  const loc=S.locs.find(l=>l.id===r.locId);
  showModal(`Reservation ${r.code}`,`
    <div style="background:var(--bg);border-radius:10px;padding:14px;margin-bottom:14px"><div style="font-size:18px;font-weight:700;margin-bottom:4px">${r.name}</div><div style="font-size:12px;color:var(--mu)">${r.phone} · ${r.email}</div></div>
    <div class="ig" style="grid-template-columns:repeat(2,1fr)">

    `<button class="btn bo" onclick="closeModal()">Close</button><button class="btn bs" onclick="checkInRes('${id}');closeModal()">Check In →</button>`);

}

// ═══ MONTHLY ACCOUNTS ════════════════════════════════════════
function pgMonthly(){
  const q=S.acctQ.toLowerCase();
  const filtered=S.monthly.filter(m=>{
    const mf=S.acctFilter==='all'||m.status===S.acctFilter;
    const mq=!q||[m.fn,m.ln,m.email,m.num,m.co||''].some(f=>f.toLowerCase().includes(q))||m.vehicles.some(v=>v.plate.toLowerCase().includes(q));
    return mf&&mq;
  });
  const cnts={all:S.monthly.length,active:S.monthly.filter(m=>m.status==='active').length,delinquent:S.monthly.filter(m=>m.status==='delinquent').length,suspended:S.monthly.filter(m=>m.status==='suspended').length};
  const acct=S.monthly.find(m=>m.id===S.selAcct);
  const list=filtered.map(m=>`<div class="ai${S.selAcct===m.id?' on':''}" onclick="S.selAcct='${m.id}';S.acctTab='overview';S.editNotes=false;renderContent()">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:5px">
      <div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,${m.status==='active'?'#2563EB,#1D4ED8':m.status==='delinquent'?'#D97706,#B45309':'#DC2626,#B91C1C'});display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">${inits(m.fn,m.ln)}</div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--navy)">${m.fn} ${m.ln}</div><div style="font-family:var(--mono);font-size:10px;color:var(--dim)">${m.num}</div></div>
      <span class="bdg ${m.status==='active'?'ba':m.status==='delinquent'?'bam':'bu'}">${m.status}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--mu);padding-left:44px"><span>${m.vehicles.filter(v=>v.active).length}v · ${m.locN?.split(' ')[0]}</span><span style="font-family:var(--mono);font-weight:700;color:var(--navy);font-size:12px">$${(m.rate/100).toFixed(0)}/mo</span></div>
  </div>`).join('');
  const right=acct?renderAcctDetail(acct):`<div style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--dim);height:100%"><div style="font-size:48px">👥</div><div style="font-size:14px">Select an account</div></div>`;
  return`<div class="split">
    <div class="split-l">
      <div style="padding:14px 14px 10px;border-bottom:1px solid var(--brd)">
        <div class="fb" style="margin-bottom:10px"><div style="font-size:14px;font-weight:700;color:var(--navy)">Monthly Accounts</div><button class="btn bp bsm" onclick="openNewAcctModal()">＋ New</button></div>
        <div class="sw2"><span class="sw2-ico">🔍</span><input id="acct-q" class="sinp" placeholder="Name, plate, email…" value="${S.acctQ}" oninput="S.acctQ=this.value;renderContent()"></div>
        <div class="chips" style="margin-top:8px">${[['all','All'],['active','Active'],['delinquent','Late'],['suspended','Suspended']].map(([k,l])=>`<button class="chip${S.acctFilter===k?' on':''}" onclick="S.acctFilter='${k}';renderContent()">${l} ${cnts[k]}</button>`).join('')}</div>
      </div>
      <div style="flex:1;overflow-y:auto">${filtered.length===0?'<div class="empty">No accounts found</div>':list}</div>
    </div>
    <div class="split-r">${right}</div>
  </div>`;
}

function renderAcctDetail(a){

  const outstanding=a.invoices.filter(i=>['sent','overdue'].includes(i.status)).reduce((s,i)=>s+i.amt,0);
  const overdueC=a.invoices.filter(i=>i.status==='overdue').length;
  let body='';
  if(S.acctTab==='overview') body=`
    ${a.status==='delinquent'?`<div class="alert-box w">⚠<div><div style="font-weight:700">Delinquent — ${a.delin} month${a.delin!==1?'s':''}</div></div></div>`:''}
    ${a.status==='suspended'?`<div class="alert-box d">🚫<div><div style="font-weight:700">Suspended — Plate Access Revoked</div></div></div>`:''}
    <div class="sr"><div class="sc"><div class="sv" style="color:var(--green)">$${(tPaid/100).toFixed(0)}</div><div class="sl">Total Paid</div></div>
    <div class="sc"><div class="sv" style="color:${outstanding>0?'var(--red)':'var(--green)'}">$${(outstanding/100).toFixed(0)}</div><div class="sl">Outstanding</div></div>
    <div class="sc"><div class="sv">${a.invoices.length}</div><div class="sl">Invoices</div></div>

    <div class="card"><div class="ch"><div class="ct">Contact & Billing</div></div><div class="cb">
      <div class="ig">${[{l:'Email',v:a.email},{l:'Phone',v:a.phone||'—'},{l:'Company',v:a.co||'—'},{l:'Location',v:a.locN},{l:'Rate',v:`$${(a.rate/100).toFixed(0)}/mo`},{l:'Since',v:fmtD(a.since)}].map(c=>`<div class="ic"><div class="il">${c.l}</div><div class="iv">${c.v}</div></div>`).join('')}</div>
      <div class="fb" style="margin-top:14px;padding-top:10px;border-top:1px solid var(--brd)">
        <div><div style="font-weight:600;font-size:13px">Autopay</div><div style="font-size:11px;color:var(--mu)">${a.autopay?'Enabled':'Manual'}</div></div>
        <label class="tog"><input type="checkbox" ${a.autopay?'checked':''} onchange="toggleAutopay('${a.id}')"><span class="tog-sl"></span></label>
      </div>
    </div></div>`;
  else if(S.acctTab==='vehicles') body=`
    <div class="fb" style="margin-bottom:8px"><div style="font-size:12px;color:var(--mu)">${a.vehicles.filter(v=>v.active).length} active</div><button class="btn bp bsm" onclick="openAddVehicleModal('${a.id}')">＋ Add</button></div>
    ${a.vehicles.map(v=>`<div class="vc" style="${v.active?'':'opacity:.5'}"><span class="ptag">${v.plate}</span><div style="flex:1"><div style="font-size:13px;font-weight:600">${[v.make,v.model].filter(Boolean).join(' ')||'—'}</div><div style="font-size:11px;color:var(--mu)">${v.color||'—'} · <span style="color:${v.active?'var(--green)':'var(--red)'};font-weight:600">${v.active?'Active':'Revoked'}</span></div></div>
      <button class="btn bsm ${v.active?'bw':'bs'}" onclick="toggleVehicle('${a.id}','${v.id}')">${v.active?'Revoke':'Restore'}</button>
      <button class="btn bo bxs" onclick="removeVehicle('${a.id}','${v.id}')">🗑</button></div>`).join('')}`;
  else if(S.acctTab==='invoices') body=`
    <div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn bp bsm" onclick="openInvoiceModal('${a.id}','')">＋ New Invoice</button></div>${overdueC>0?`<div class="alert-box d">⚠<div><div style="font-weight:700">${overdueC} overdue invoice${overdueC>1?'s':''}</div></div></div>`:''}
    <div class="card"><table class="itbl"><thead><tr><th>Period</th><th>Amount</th><th>Due</th><th>Status</th><th></th></tr></thead><tbody>
    ${[...a.invoices].reverse().map(inv=>`<tr><td style="font-weight:600">${inv.period}</td><td class="money" style="color:${inv.status==='overdue'?'var(--red)':'var(--navy)'}">${c$(inv.amt/100)}</td><td style="font-size:11px;color:var(--mu)">${fmtD(inv.due)}</td><td><span class="bdg ${inv.status==='paid'?'ba':inv.status==='overdue'?'bu':inv.status==='sent'?'bm':'bg2'}">${inv.status}</span></td><td><div style="display:flex;gap:4px">${['sent','overdue'].includes(inv.status)?`<button class="btn bs bxs" onclick="markInvPaid('${a.id}','${inv.id}')">✓ Paid</button><button class="btn bo bxs" onclick="openInvoiceModal('${a.id}','${inv.id}')">Resend</button>`:inv.status==='paid'?`<span style="font-size:11px;color:var(--green)">✓ ${fmtD(inv.paid)}</span>`:`<button class="btn bp bxs" onclick="openInvoiceModal('${a.id}','${inv.id}')">📧 Send</button>`}</div></td></tr>`).join('')}
    </tbody></table></div>`;
  else body=`<div class="card"><div class="ch"><div class="ct">Notes</div>${S.editNotes?`<div style="display:flex;gap:7px"><button class="btn bo bsm" onclick="S.editNotes=false;renderContent()">Cancel</button><button class="btn bp bsm" onclick="saveNotes('${a.id}')">Save</button></div>`:`<button class="btn bo bsm" onclick="S.editNotes=true;S.notesVal='${(a.notes||'').replace(/'/g,'&#39;')}';renderContent()">✏ Edit</button>`}</div>

  return`
    <div style="background:var(--sur);border-bottom:1px solid var(--brd);padding:16px 22px;position:sticky;top:0;z-index:10">
      <div class="fb">
        <div><div style="font-family:var(--serif);font-size:22px;color:var(--navy)">${a.fn} ${a.ln}</div>
          <div style="display:flex;gap:10px;align-items:center;margin-top:4px;flex-wrap:wrap;font-size:12px;color:var(--mu)">
            <span style="font-family:var(--mono);font-size:11px">${a.num}</span>
            <span class="bdg ${a.status==='active'?'ba':a.status==='delinquent'?'bam':'bu'}">${a.status}</span>
            ${a.co?`<span>${a.co}</span>`:''}
          </div>
        </div>
        <div style="display:flex;gap:8px">
          ${a.status!=='suspended'?`<button class="btn bw bsm" onclick="suspendAcct('${a.id}')">🚫 Suspend</button>`:''}
          ${a.status==='suspended'?`<button class="btn bs bsm" onclick="reactivateAcct('${a.id}')">✓ Reactivate</button>`:''}
        </div>
      </div>
    </div>
    <div class="tabs">${[['overview','Overview'],['vehicles','Vehicles'],['invoices',`Invoices${overdueC?`<span class="tabb">${overdueC}</span>`:''}`],['notes','Notes']].map(([id,lbl])=>`<div class="tab${S.acctTab===id?' on':''}" onclick="S.acctTab='${id}';S.editNotes=false;renderContent()">${lbl}</div>`).join('')}</div>
    <div style="padding:18px 22px;display:flex;flex-direction:column;gap:14px">${body}</div>`;
}

function toggleAutopay(id){S.monthly=S.monthly.map(m=>m.id===id?{...m,autopay:!m.autopay}:m);save();renderContent();toast('Autopay updated');}
function suspendAcct(id){S.monthly=S.monthly.map(m=>m.id===id?{...m,status:'suspended',vehicles:m.vehicles.map(v=>({...v,active:false}))}:m);save();renderContent();toast('Account suspended','warn');}
function reactivateAcct(id){S.monthly=S.monthly.map(m=>m.id===id?{...m,status:'active',delin:0,vehicles:m.vehicles.map(v=>({...v,active:true}))}:m);save();renderContent();toast('Reactivated','ok');}
function toggleVehicle(aid,vid){S.monthly=S.monthly.map(m=>m.id===aid?{...m,vehicles:m.vehicles.map(v=>v.id===vid?{...v,active:!v.active}:v)}:m);save();renderContent();toast('Vehicle updated');}
function removeVehicle(aid,vid){S.monthly=S.monthly.map(m=>m.id===aid?{...m,vehicles:m.vehicles.filter(v=>v.id!==vid)}:m);save();renderContent();toast('Vehicle removed','warn');}
function markInvPaid(aid,iid){S.monthly=S.monthly.map(m=>m.id===aid?{...m,invoices:m.invoices.map(i=>i.id===iid?{...i,status:'paid',paid:new Date().toISOString().slice(0,10)}:i)}:m);save();renderContent();toast('Marked paid','ok');}
function saveNotes(id){S.monthly=S.monthly.map(m=>m.id===id?{...m,notes:S.notesVal}:m);S.editNotes=false;save();renderContent();toast('Notes saved');}

// ═══ ENFORCEMENT & CITATIONS ══════════════════════════════════
const VIOLATION_TYPES={no_payment:'No Payment',overstay:'Overstay',suspended:'Suspended Permit',no_permit:'No Valid Permit',wrong_zone:'Wrong Zone',blocked:'Blocking Access',other:'Other'};

function pgEnforcement(){
  const q=S.citQ.toLowerCase();
  const filtered=S.citations.filter(c=>{
    const mf=S.citFilter==='all'||c.status===S.citFilter;
    const mq=!q||c.plate.toLowerCase().includes(q)||c.locN.toLowerCase().includes(q)||(VIOLATION_TYPES[c.violation]||'').toLowerCase().includes(q);
    return mf&&mq;
  });
  const unp=S.citations.filter(c=>c.status==='unpaid').length;
  const selCit=S.citations.find(c=>c.id===S.selCit);

  const rows=filtered.map(c=>{
    const ses=c.sesId?S.sessions.find(s=>s.id===c.sesId):null;
    const statCls={unpaid:'bu',paid:'ba',appealed:'bam',voided:'bg2'}[c.status]||'bg2';
    return`<tr onclick="S.selCit='${c.id}';renderContent()" style="cursor:pointer">
      <td style="font-family:var(--mono);font-size:10px;color:var(--blue);font-weight:700">${c.id}</td>
      <td><span class="ptag">${c.plate}</span></td>
      <td style="font-size:11px;color:var(--mu)">${c.locN}</td>
      <td style="font-size:11px">${VIOLATION_TYPES[c.violation]||c.violation}</td>
      <td class="money" style="color:var(--red)">${c$(c.amt/100)}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--mu)">${fmtDT(c.issuedAt)}</td>
      <td><span class="bdg ${statCls}">${c.status}</span></td>
      <td onclick="event.stopPropagation()">
        ${c.status==='unpaid'?`<button class="btn bs bxs" onclick="markCitPaid('${c.id}')">Mark Paid</button>`:''}
        <button class="btn bo bxs" onclick="S.selCit='${c.id}';renderContent()">View</button>
      </td>
    </tr>`;
  });

  // Right panel: detail OR add-new form
  let rightPanel=`<div class="empty" style="padding:60px 20px"><div style="font-size:36px;margin-bottom:10px">🛡</div>Select a citation to view details,<br>or issue a new one above.</div>`;
  if(S.selCit==='new') rightPanel=renderCitationForm();
  else if(selCit) rightPanel=renderCitationDetail(selCit);

  return`
    <div class="ph"><div><div class="pt">Enforcement & Citations</div><div class="ps">${unp} unpaid · ${S.citations.length} total</div></div>
      <button class="btn bp" onclick="S.selCit='new';renderContent()">＋ Issue Citation</button>
    </div>
    <!-- Plate quick-lookup -->
    <div class="card" style="padding:14px 18px;display:flex;gap:12px;align-items:center">
      <div style="font-size:12px;font-weight:700;color:var(--navy);flex-shrink:0">Quick Plate Lookup</div>
      <div class="sw2" style="flex:1"><span class="sw2-ico">🔍</span><input id="cit-q" class="sinp" placeholder="Search plate, location, violation…" value="${S.citQ}" oninput="S.citQ=this.value;renderContent()"></div>
      <div style="display:flex;gap:6px">
        ${[['all',`All ${S.citations.length}`],['unpaid',`Unpaid ${unp}`],['paid','Paid'],['appealed','Appealed'],['voided','Voided']].map(([f,l])=>`<button class="chip${S.citFilter===f?' on':''}" onclick="S.citFilter='${f}';renderContent()">${l}</button>`).join('')}
      </div>
    </div>

    <div class="g2" style="grid-template-columns:1.4fr 1fr;gap:16px">
      <!-- LEFT: citations table -->
      <div class="card">
        <div class="ch"><div class="ct">🛡 Citations Database</div><span class="bdg ${unp>0?'bu':'ba'}">${unp} unpaid</span></div>
        ${filtered.length===0?'<div class="empty">No citations match</div>':`<table class="tbl"><thead><tr><th>Citation #</th><th>Plate</th><th>Location</th><th>Violation</th><th>Amount</th><th>Issued</th><th>Status</th><th></th></tr></thead><tbody>${rows.join('')}</tbody></table>`}
      </div>
      <!-- RIGHT: detail -->
      <div>${rightPanel}</div>
    </div>`;
}

function renderCitationDetail(c){
  const ses=c.sesId?S.sessions.find(s=>s.id===c.sesId):null;
  const loc=S.locs.find(l=>l.id===c.locId);
  const statCls={unpaid:'bu',paid:'ba',appealed:'bam',voided:'bg2'}[c.status]||'bg2';
  return`
    <div class="card"><div class="ch">

function issueCitation(){
  const plate=(document.getElementById('nc-plate')?.value||'').trim().toUpperCase();
  const locId=document.getElementById('nc-loc')?.value;
  const viol=document.getElementById('nc-viol')?.value;
  const amt=parseFloat(document.getElementById('nc-amt')?.value||75);
  if(!plate||!locId||!viol){toast('Plate, location and violation required','err');return;}
  const loc=S.locs.find(l=>l.id===locId);
  const id='CIT-'+String(S.citations.length+1).padStart(3,'0');
  S.citations=[{
    id,plate,locId,locN:loc?.name||'—',violation:viol,
    desc:document.getElementById('nc-desc')?.value||VIOLATION_TYPES[viol]||viol,
    amt:Math.round(amt*100),
    note:document.getElementById('nc-note')?.value||'',
    issuedAt:Date.now(),
    issuedBy:(document.getElementById('nc-officer')?.value||'').trim(),
    status:'unpaid',status_at:null,
    sesId:document.getElementById('nc-ses')?.value||null
  },...S.citations];
  save();S.selCit=id;renderContent();toast(`Citation ${id} issued`,'ok');
}

function markCitPaid(id){S.citations=S.citations.map(c=>c.id===id?{...c,status:'paid',status_at:Date.now()}:c);save();renderContent();toast('Citation marked paid','ok');}
function markCitAppealed(id){S.citations=S.citations.map(c=>c.id===id?{...c,status:'appealed'}:c);save();renderContent();toast('Citation appealed','warn');}
function markCitVoided(id){S.citations=S.citations.map(c=>c.id===id?{...c,status:'voided',status_at:Date.now()}:c);save();renderContent();toast('Citation voided','warn');}
function linkCitToSession(id){

// Square pay modal for citations
function openSqPayModal(citId){
  const c=S.citations.find(x=>x.id===citId);if(!c)return;
  showModal(`Collect Payment — ${c.plate}`,`
    <div class="alert-box t" style="margin-bottom:12px">💳 <div><div style="font-weight:700">Citation ${c.id} — ${c.plate}</div><div>Amount: <b>${c$(c.amt/100)}</b> · ${VIOLATION_TYPES[c.violation]||c.violation}</div></div></div>
    ${S.squareCfg.connected
      ? `<div class="alert-box s">✓ Square connected — click below to generate a hosted checkout link sent to the customer.</div>`
      : `<div class="alert-box w">⚠ Square not connected. <a href="#" onclick="go('square');closeModal()" style="color:var(--amber);font-weight:700">Connect Square →</a></div>`}`,
    `<button class="btn bo" onclick="closeModal()">Cancel</button>
     <button class="btn bs bsm" onclick="markCitPaid('${citId}');closeModal()">💵 Cash/Manual</button>
     <button class="btn bp" onclick="sqCollectCitation('${citId}')" ${S.squareCfg.connected?'':'disabled'}>🔗 Send Square Link</button>`);
}
async function sqCollectCitation(id){
  const c=S.citations.find(x=>x.id===id);if(!c)return;
  const btn=document.querySelector('[onclick*="sqCollectCitation"]');
  if(btn){btn.disabled=true;btn.textContent='Generating…';}
  const res=await sqCreatePaymentLink(c.amt,`Citation ${c.id} — ${c.plate} — ${VIOLATION_TYPES[c.violation]||c.violation}`,null);
  if(res.ok){
    closeModal();
    showModal(`Payment Link — ${c.id}`,`
      <div class="alert-box s">✓ <div><b>Payment link generated!</b> Share with the customer or open now.</div></div>
      <div style="background:var(--bg);border-radius:10px;padding:13px;margin-bottom:12px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);margin-bottom:6px">Square Checkout URL</div>
        <div style="font-family:var(--mono);font-size:11px;word-break:break-all;color:var(--blue)">${res.url}</div>
      </div>`,
      `<button class="btn bo" onclick="closeModal()">Close</button>
       <a href="${res.url}" target="_blank" class="btn bs" style="text-decoration:none">Open Checkout →</a>
       <button class="btn bp" onclick="markCitPaid('${id}');closeModal()">✓ Mark Paid</button>`);
  } else if(res.cors){
    closeModal();
    toast('Deploy to HTTPS for live Square links — use Cash/Manual for now','warn');
  } else {
    toast(res.error,'err');
    if(btn){btn.disabled=false;btn.textContent='🔗 Send Square Link';}
  }
}

// ═══ LPR ENGINE ══════════════════════════════════════════════
const FAKE_PLATES=['JKL-4821','NTX-9034','VMS-2277','BHG-6610','QRP-1155','YTZ-8843','WKL-3302','FMP-7741','RQT-5512','WXY-8821','ZBN-3391','CPR-0082','STK-4478','NXR-2219','GKR-8834'];

function lprToggleSim(){
  if(S.lprSim){
    S.lprSim=false;
    if(S.lprSimInterval){clearInterval(S.lprSimInterval);S.lprSimInterval=null;}
  } else {
    S.lprSim=true;
    // Fire first event immediately
    lprSimTick();
    S.lprSimInterval=setInterval(()=>{lprSimTick();renderContent();},3500);
  }
  renderContent();
}

function lprSimTick(){
  const loc=S.locs.find(l=>l.id===S.lprLocId)||S.locs[0];
  const active=S.sessions.filter(s=>!s.exitAt&&s.locId===loc.id);

  // 40% chance exit event if there are active sessions, else entry
  const isExit=active.length>2&&Math.random()<0.4;

  if(isExit){
    const ses=active[Math.floor(Math.random()*active.length)];
    lprFireEvent({plate:ses.plate,dir:'exit',locId:loc.id,locName:loc.name,sesId:ses.id,conf:Math.round(88+Math.random()*12)});
  } else {
    // Check if any demo plate already has an active session here
    const usedPlates=new Set(active.map(s=>s.plate));
    const available=FAKE_PLATES.filter(p=>!usedPlates.has(p));
    const plate=available.length>0?available[Math.floor(Math.random()*available.length)]:FAKE_PLATES[Math.floor(Math.random()*FAKE_PLATES.length)];
    const conf=Math.round(75+Math.random()*25);
    lprFireEvent({plate,dir:'entry',locId:loc.id,locName:loc.name,conf});
  }
}

function lprFireEvent({plate,dir,locId,locName,sesId,conf}){
  const loc=S.locs.find(l=>l.id===locId)||S.locs[0];
  const lowConf=conf<(S.lprConfMin||85);
  const id='LPR'+uid();

  // Cross-check monthly permits
  const permit=S.monthly.find(m=>m.vehicles.some(v=>v.active&&v.plate.replace(/[^A-Z0-9]/g,'')===plate.replace(/[^A-Z0-9]/g,'')));
  // Cross-check reservations
  const reservation=S.reservations.find(r=>r.plate.replace(/[^A-Z0-9]/g,'')===plate.replace(/[^A-Z0-9]/g,'')&&r.status==='upcoming'&&r.startAt<=Date.now()+900000);
  const matchType=permit?'permit':reservation?'reservation':null;

  const event={id,plate,dir,locId,locName,ts:Date.now(),conf,lowConf,matchType,sesId:sesId||null,auto:false,processed:false};

  if(dir==='entry'&&!lowConf){
    // Auto-log the session
    const dup=S.sessions.find(s=>!s.exitAt&&s.plate.replace(/[^A-Z0-9]/g,'')===plate.replace(/[^A-Z0-9]/g,'')&&s.locId===locId);
    if(!dup){
      const rateType=permit?'monthly':reservation?reservation.rateType:'hourly';
      const rate=rateType==='monthly'?0:reservation?reservation.amount:(loc?.rates?.hourly||4);
      const newSes={id:'S'+String(++sesSeq).padStart(3,'0'),locId,lvlId:'',space:'',plate,make:'',color:'',type:rateType,entryAt:Date.now(),payS:rateType==='monthly'?'permit':'pending',rate,paid:0,note:`LPR auto-log · ${conf}% conf${matchType?' · '+matchType:''}`,exitAt:null};
      S.sessions.push(newSes);
      loc.occ=Math.min(loc.occ+1,loc.cap);
      event.sesId=newSes.id;
      event.auto=true;
      if(matchType==='reservation'&&reservation){reservation.status='active';}
    }
  }

  if(dir==='exit'){
    // Fire the attendant alert
    event.sesId=sesId||S.sessions.find(s=>!s.exitAt&&s.plate.replace(/[^A-Z0-9]/g,'')===plate.replace(/[^A-Z0-9]/g,'')&&s.locId===locId)?.id||null;
    if(event.sesId){
      S.lprExitAlert={...event,locName};
      showLprExitAlert(event.sesId,lowConf);
    }
  }

  S.lprFeed=[event,...S.lprFeed].slice(0,100);
  save();
}

function lprFireExit(){
  // Test: fire exit on first active session
  const s=S.sessions.find(x=>!x.exitAt);
  if(!s){toast('No active sessions to test exit with','warn');return;}
  lprFireEvent({plate:s.plate,dir:'exit',locId:s.locId,locName:S.locs.find(l=>l.id===s.locId)?.name||'—',sesId:s.id,conf:96});
  renderContent();
}

function showLprExitAlert(sesId,lowConf){
  const el=$('lpr-exit-overlay');
  if(!el)return;
  el.style.display='flex';
  updateLprExitContent(sesId,lowConf);
  // Live-update the charge every second
  if(window._lprExitTimer)clearInterval(window._lprExitTimer);
  window._lprExitTimer=setInterval(()=>updateLprExitContent(sesId,lowConf),1000);
}

function updateLprExitContent(sesId,lowConf){
  const s=S.sessions.find(x=>x.id===sesId);
  const tcEl=$('lpr-exit-time');if(tcEl)tcEl.textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const camEl=$('lpr-exit-camname');
  const loc=s?S.locs.find(l=>l.id===s.locId):null;
  if(camEl)camEl.textContent=loc?`Exit Camera — ${loc.name}`:'—';
  if(!s){$('lpr-exit-content').innerHTML=`<div class="empty">Session not found</div>`;return;}
  const charge=calcCharge(s);
  const isPerm=s.type==='monthly'||s.type==='permit';
  const elapsedMs=Date.now()-s.entryAt;
  const mins=Math.floor(elapsedMs/60000);
  const permit=S.monthly.find(m=>m.vehicles.some(v=>v.plate===s.plate&&v.active));

  $('lpr-exit-content').innerHTML=`
    ${lowConf?`<div class="alert-box w" style="margin-bottom:14px">⚠ <div><div style="font-weight:700">Low Confidence Read — Verify Plate</div><div>Review plate below before collecting payment</div></div></div>`:''}
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
      <div style="background:var(--bg);border-radius:12px;padding:12px 18px;flex:1">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:4px">License Plate</div>
        <div style="font-family:var(--mono);font-size:28px;font-weight:700;color:var(--navy);letter-spacing:.06em">${s.plate}</div>
      </div>
      <div style="background:var(--bg);border-radius:12px;padding:12px 18px;flex:1;text-align:center">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:4px">Duration</div>
        <div class="lpr-timer">${durLive(s.entryAt)}</div>
        <div style="font-size:10px;color:var(--faint);margin-top:2px">Entry: ${fmtDT(s.entryAt)}</div>
      </div>
    </div>
    ${permit?`<div class="alert-box s" style="margin-bottom:14px">◈ <div><div style="font-weight:700">Monthly Permit — ${permit.fn} ${permit.ln}</div><div>No charge · Gate opens automatically</div></div></div>`:''}
    ${!isPerm?`<div class="lpr-big-charge">${c$(charge)}</div><div class="lpr-big-dur">${durLive(s.entryAt)} · ${Math.ceil(Math.max(0,(Date.now()-s.entryAt)/60000-(loc?.rates?.graceMins||5))/30)} 30-min blocks</div>
    <div style="background:var(--bg);border-radius:10px;padding:12px 14px;margin-bottom:16px;display:flex;flex-direction:column;gap:5px">

function lprCollect(sesId,method){
  const s=S.sessions.find(x=>x.id===sesId);if(!s)return;
  const charge=calcCharge(s);
  processExit(sesId);
  const ref='LPR-'+uid().slice(0,6).toUpperCase();
  closeLprExitAlert();
  toast(`✓ ${s.plate} — ${c$(charge*1.0875)} collected via ${method} · ${ref}`,'ok');
  // Mark event processed
  if(S.lprExitAlert)S.lprFeed=S.lprFeed.map(e=>e.id===S.lprExitAlert.id?{...e,processed:true}:e);
  S.lprExitAlert=null;
  renderContent();
}

function lprOpenGate(sesId){
  processExit(sesId);
  closeLprExitAlert();
  S.lprExitAlert=null;
  toast('Gate opened — monthly permit','ok');
  renderContent();
}

function lprSkip(){
  closeLprExitAlert();
  S.lprExitAlert=null;
  toast('Exit overridden — gate opened','warn');
  renderContent();
}

function closeLprExitAlert(){
  if(window._lprExitTimer){clearInterval(window._lprExitTimer);window._lprExitTimer=null;}
  const el=$('lpr-exit-overlay');if(el)el.style.display='none';
}

function lprManualCorrect(eventId){
  const ev=S.lprFeed.find(e=>e.id===eventId);
  if(!ev)return;
  showModal('Correct Plate Read',`
    <div class="alert-box w">⚠ <div>OCR confidence: <b>${ev.conf}%</b>. Verify the plate physically before correcting.</div></div>
    <label class="flbl">Camera Capture</label>
    <div style="background:var(--navy);border-radius:8px;padding:14px;text-align:center;font-family:var(--mono);font-size:24px;font-weight:700;color:#fff;letter-spacing:.12em;margin-bottom:13px">${ev.plate}</div>
    <label class="flbl">Corrected Plate *</label>
    <input id="lpr-fix-plate" class="fi mono big" value="${ev.plate}" autocapitalize="characters">
    <label class="flbl">Reason</label>
    <input id="lpr-fix-reason" class="fi" placeholder="e.g. OCR misread 0 as O">`,
    `<button class="btn bo" onclick="closeModal()">Cancel</button><button class="btn bw" onclick="lprApplyFix('${eventId}')">Apply Correction</button>`);
}

function lprApplyFix(eventId){
  const plate=(document.getElementById('lpr-fix-plate')?.value||'').toUpperCase().trim();
  if(!plate){toast('Enter a plate','err');return;}
  S.lprFeed=S.lprFeed.map(e=>e.id===eventId?{...e,plate,lowConf:false}:e);
  const ev=S.lprFeed.find(e=>e.id===eventId);
  if(ev?.sesId)S.sessions=S.sessions.map(s=>s.id===ev.sesId?{...s,plate}:s);
  save();closeModal();renderContent();toast(`Plate corrected to ${plate}`);
}

function testAxisCamera(id){
  const cam=S.axisCameras.find(c=>c.id===id);if(!cam)return;
  toast(`⚡ Sending test read from ${cam.name}…`);
  setTimeout(()=>{
    const testPlate='TEST-'+Math.floor(Math.random()*9000+1000);
    lprFireEvent({plate:testPlate,dir:cam.dir,locId:cam.locId,locName:cam.locN,conf:97});

function sqConnect(){
  const appId=document.getElementById('sq-appid')?.value||S.squareCfg.appId;
  const locId=document.getElementById('sq-locid')?.value||S.squareCfg.locationId;
  const token=document.getElementById('sq-token')?.value||S.squareCfg.accessToken;
  const termId=document.getElementById('sq-terminal')?.value||S.squareCfg.terminalDeviceId||'';
  if(!appId||!locId||!token){toast('App ID, Location ID and Access Token required','err');return;}
  S.squareCfg={...S.squareCfg,appId,locationId:locId,accessToken:token,terminalDeviceId:termId,connected:true};
  save();renderContent();toast('Square connected!','ok');
}
function sqDisconnect(){S.squareCfg={...S.squareCfg,connected:false,appId:'',locationId:'',accessToken:''};save();renderContent();toast('Square disconnected','warn');}

function sqLoadSDK(){
  if(!IS_HTTPS || window.Square) return;
  const el = document.createElement('script');
  el.src = S.squareCfg.sandbox
    ? 'https://sandbox.web.squarecdn.com/v1/square.js'
    : 'https://web.squarecdn.com/v1/square.js';
  el.onload = () => { console.log('[APS] Square Web Payments SDK loaded'); };
  el.onerror = () => console.warn('[APS] Square SDK failed to load');
  document.head.appendChild(el);
}

async function sqInitCard(containerId){
  if(!window.Square||!S.squareCfg.appId||!S.squareCfg.locationId)return;
  try{
    const payments=window.Square.payments(S.squareCfg.appId,S.squareCfg.locationId);
    const card=await payments.card();
    await card.attach('#'+containerId);
    window._sqCard=card;
  }catch(e){
    const el=document.getElementById(containerId);
    if(el)el.innerHTML=`<div class="alert-box w">⚠ <div>Square SDK error: ${e.message}. Check your Application ID and Location ID.</div></div>`;
  }
}

async function sqTestPay(){
  if(!window._sqCard){toast('Card form not ready','err');return;}
  const resultEl=document.getElementById('sq-result');
  if(resultEl)resultEl.innerHTML='<span style="color:var(--mu)">Processing…</span>';
  try{
    const result=await window._sqCard.tokenize();
    if(result.status==='OK'){
      if(resultEl)resultEl.innerHTML=`<div class="alert-box s">✓ <div><b>Token generated:</b> <span style="font-family:var(--mono);font-size:11px">${result.token}</span><br><span style="font-size:11px">POST this token + amount to your APS backend → Square Payments API → funds captured.</span></div></div>`;
    }else{
      if(resultEl)resultEl.innerHTML=`<div class="alert-box d">✕ ${result.errors?.map(e=>e.message).join(', ')||'Card error'}</div>`;
    }
  }catch(e){
    if(resultEl)resultEl.innerHTML=`<div class="alert-box d">✕ ${e.message}</div>`;
  }
}
